<!DOCTYPE html>
<html>
<head>
    <title>Вход в Pioneria Project Chat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 40px;
            width: 350px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        
        .tab {
            display: flex;
            margin-bottom: 30px;
        }
        
        .tab button {
            flex: 1;
            padding: 10px;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        
        .tab button.active {
            background: #667eea;
            color: white;
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        
        .message.error {
            background: #fee;
            color: #c33;
            display: block;
        }
        
        .message.success {
            background: #efe;
            color: #3c3;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Pioneria Project Chat</h1>
        
        <div class="tab">
            <button id="tabLogin" class="active">Вход</button>
            <button id="tabRegister">Регистрация</button>
        </div>
        
        <div id="loginForm" class="form active">
            <h2>Вход в чат</h2>
            <input type="text" id="loginUsername" placeholder="Имя пользователя">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="login()">Войти</button>
        </div>
        
        <div id="registerForm" class="form">
            <h2>Регистрация</h2>
            <input type="text" id="registerUsername" placeholder="Имя пользователя">
            <input type="password" id="registerPassword" placeholder="Пароль">
            <input type="password" id="registerConfirm" placeholder="Повторите пароль">
            <button onclick="register()">Зарегистрироваться</button>
        </div>
        
        <div id="message" class="message"></div>
    </div>
    
    <script>
        // Переключение между вкладками
        document.getElementById('tabLogin').addEventListener('click', () => {
            document.getElementById('tabLogin').classList.add('active');
            document.getElementById('tabRegister').classList.remove('active');
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('registerForm').classList.remove('active');
            document.getElementById('message').style.display = 'none';
        });
        
        document.getElementById('tabRegister').addEventListener('click', () => {
            document.getElementById('tabRegister').classList.add('active');
            document.getElementById('tabLogin').classList.remove('active');
            document.getElementById('registerForm').classList.add('active');
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('message').style.display = 'none';
        });
        
        // Регистрация
        async function register() {
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            
            if (!username || !password || !confirm) {
                showMessage('Заполните все поля', 'error');
                return;
            }
            
            if (password !== confirm) {
                showMessage('Пароли не совпадают', 'error');
                return;
            }
            
            const response = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            
            const result = await response.json();
            
            if (result.success) {
                showMessage('Регистрация успешна! Теперь можно войти', 'success');
                // Переключаем на вкладку входа
                document.getElementById('tabLogin').click();
            } else {
                showMessage(result.message, 'error');
            }
        }
        
        // Вход
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showMessage('Заполните все поля', 'error');
                return;
            }
            
            const response = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            
            const result = await response.json();
            
            if (result.success) {
                // Сохраняем имя пользователя и переходим в чат
                localStorage.setItem('username', username);
                window.location.href = '/chat.html';
            } else {
                showMessage(result.message, 'error');
            }
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }
    </script>
</body>
</html>
