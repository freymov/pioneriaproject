<!DOCTYPE html>
<html>
<head>
    <title>Pioneria Project Chat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            height: 90vh;
            width: 100%;
        }
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            border-radius: 20px 20px 0 0;
        }
        .chat-header h2 {
            margin: 0;
            color: #333;
            font-size: 1.2rem;
        }
        .chat-header button {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        .chat-header button:hover {
            background: #cc0000;
        }
        #messages {
            list-style-type: none;
            padding: 20px;
            margin: 0;
            flex-grow: 1;
            overflow-y: auto;
            background: #f9f9f9;
        }
        #messages li {
            padding: 12px 15px;
            margin-bottom: 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            word-wrap: break-word;
        }
        .system {
            background: #e3f2fd;
            color: #1976d2;
            text-align: center;
            font-style: italic;
            font-size: 0.9rem;
        }
        .user {
            font-weight: bold;
            color: #667eea;
            margin-right: 8px;
        }
        .timestamp {
            color: #999;
            font-size: 0.7rem;
            margin-left: 10px;
        }
        .message-form {
            display: flex;
            padding: 20px;
            border-top: 1px solid #eee;
            background: white;
            border-radius: 0 0 20px 20px;
            gap: 10px;
        }
        #messageInput {
            flex-grow: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        #messageInput:focus {
            border-color: #667eea;
            outline: none;
        }
        .message-form button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .message-form button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🎵 Pioneria Project Chat - <span id="userName"></span></h2>
            <div>
                <button onclick="goToLobby()" style="background: #667eea; margin-right: 10px;">🏠 Лобби</button>
                <button onclick="leaveChat()">Выйти</button>
            </div>
        </div>
        <!-- <div class="chat-header">
            <h2>🎵 Pioneria Project Chat - <span id="userName"></span></h2>
            <button onclick="leaveChat()">Выйти</button>
        </div> -->
        
        <ul id="messages"></ul>
        
        <form class="message-form" id="chatForm">
            <input type="text" id="messageInput" autocomplete="off" placeholder="Введите сообщение..." />
            <button type="submit">Отправить</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // Получаем данные пользователя
        const userData = JSON.parse(localStorage.getItem('user') || '{}');
        
        // Если нет данных - отправляем на логин
        if (!userData.name) {
            window.location.href = 'login.html';
        }
        
        // Показываем имя в заголовке
        document.getElementById('userName').textContent = userData.name;
        
        // Сообщаем серверу, что пользователь присоединился
        socket.emit('user joined', userData.name);

        const messagesList = document.getElementById('messages');
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function addMessage(data) {
            console.log('Добавляю сообщение:', data);
            const li = document.createElement('li');
            if (data.name === 'Система') {
                li.className = 'system';
                li.textContent = data.text;
            } else {
                const time = formatTime(data.timestamp);
                li.innerHTML = `<span class="user">${data.name}:</span> ${data.text}<span class="timestamp">${time}</span>`;
            }
            messagesList.appendChild(li);
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        // Получаем историю сообщений
        socket.on('message history', (messages) => {
            console.log('🔥 ПОЛУЧЕНА ИСТОРИЯ:', messages);
            if (messages && messages.length > 0) {
                messages.forEach(addMessage);
            } else {
                console.log('История пуста');
            }
        });

        // Получаем новое сообщение
        socket.on('message', (data) => {
            console.log('🔥 НОВОЕ СООБЩЕНИЕ:', data);
            addMessage(data);
        });

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const msg = messageInput.value.trim();
            if (msg) {
                console.log('Отправляю:', msg);
                socket.emit('chat message', msg);
                messageInput.value = '';
            }
        });

        function leaveChat() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
                function goToLobby() {
            window.location.href = 'lobby.html';
        }
    </script>
</body>
</html>
