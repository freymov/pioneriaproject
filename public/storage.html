<!DOCTYPE html>
<html lang="ru">
<head>
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Хранилище — Pioneria</title>
    <link rel="icon" type="image/jpg" href="/favicon.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root, [data-theme="light"] {
            --bg-body: linear-gradient(160deg, #e8ecf5 0%, #f0f2fa 40%, #eef0f8 100%);
            --bg-card: #ffffff;
            --bg-secondary: #f8f9fb;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --accent: #667eea;
            --accent-light: #eef0ff;
            --border-color: #eef0f5;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
            --header-bg: rgba(255,255,255,0.85);
            --header-shadow: 0 1px 0 rgba(0,0,0,0.04);
        }

        [data-theme="dark"] {
            --bg-body: linear-gradient(160deg, #13132b 0%, #1a1a35 40%, #151530 100%);
            --bg-card: #252540;
            --bg-secondary: #1e1e32;
            --text-primary: #e4e6eb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent: #7c8aff;
            --accent-light: #1e2040;
            --border-color: #2a2a40;
            --shadow: 0 1px 3px rgba(0,0,0,0.15), 0 4px 16px rgba(0,0,0,0.2);
            --header-bg: rgba(30,30,50,0.85);
            --header-shadow: 0 1px 0 rgba(255,255,255,0.04);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            color: var(--text-primary);
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: var(--header-shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none; border: none;
            font-size: 20px; cursor: pointer;
            color: var(--accent); padding: 6px 10px;
            border-radius: 10px;
        }
        .back-btn:active { background: var(--accent-light); }

        .header h2 { font-size: 17px; font-weight: 700; flex: 1; }

        .container { max-width: 650px; margin: 0 auto; padding: 20px 16px 40px; }

        .item-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }

        .item-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .item-files {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: var(--bg-secondary);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            color: var(--text-primary);
        }
        .file-link:hover { background: var(--accent-light); }
        .file-link:active { transform: scale(0.98); }

        .file-icon {
            width: 40px; height: 40px;
            background: var(--accent-light);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }

        .file-info { flex: 1; min-width: 0; }
        .file-name { font-weight: 600; font-size: 13px; }
        .file-type { font-size: 11px; color: var(--text-muted); }

        .file-download {
            color: var(--accent);
            font-size: 18px;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state .empty-text { font-size: 15px; }

        @media (max-width: 400px) {
            .container { padding: 12px 10px 32px; }
            .item-card { padding: 16px; }
        }
    </style>
</head>
<body>
    <script>
        (function() {
            document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
        })();
    </script>

    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h2>📦 Хранилище</h2>
    </div>

    <div class="container" id="storageContent">
        <div class="empty-state">
            <div class="empty-icon">📦</div>
            <div class="empty-text">Загрузка...</div>
        </div>
    </div>

    <script>
        function goBack() { window.location.href = 'lobby.html'; }

        async function loadStorage() {
            try {
                const res = await fetch('/api/storage');
                const data = await res.json();
                const container = document.getElementById('storageContent');

                if (data.success && data.items.length > 0) {
                    container.innerHTML = data.items.map(item => {
                        let filesHtml = '';
                        
                        if (item.pdf_url) {
                            const pdfName = item.pdf_url.split('/').pop().split('?')[0] || 'Ноты';
                            filesHtml += `
                                <a href="${item.pdf_url}" target="_blank" class="file-link" onclick="event.stopPropagation();">
                                    <div class="file-icon">📄</div>
                                    <div class="file-info">
                                        <div class="file-name">${pdfName}</div>
                                        <div class="file-type">PDF · Ноты</div>
                                    </div>
                                    <div class="file-download">📥</div>
                                </a>`;
                        }
                        
                        if (item.mp3_url) {
                            const mp3Name = item.mp3_url.split('/').pop().split('?')[0] || 'Запись';
                            filesHtml += `
                                <a href="${item.mp3_url}" target="_blank" class="file-link" onclick="event.stopPropagation();">
                                    <div class="file-icon">🎧</div>
                                    <div class="file-info">
                                        <div class="file-name">${mp3Name}</div>
                                        <div class="file-type">MP3 · Аудио</div>
                                    </div>
                                    <div class="file-download">📥</div>
                                </a>`;
                        }

                        return `
                            <div class="item-card">
                                <div class="item-title">🎵 ${esc(item.title)}</div>
                                <div class="item-files">${filesHtml}</div>
                            </div>`;
                    }).join('');
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <div class="empty-text">Пока ничего нет</div>
                        </div>`;
                }
            } catch(e) {
                document.getElementById('storageContent').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <div class="empty-text">Ошибка загрузки</div>
                    </div>`;
            }
        }

        function esc(text) {
            const d = document.createElement('div');
            d.textContent = text || '';
            return d.innerHTML;
        }

        loadStorage();
    </script>
</body>
</html>
