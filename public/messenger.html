<!DOCTYPE html>
<html lang="ru">
<head>
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Pioneria Messenger</title>
    <link rel="icon" type="image/jpg" href="/favicon.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root, [data-theme="light"] {
            --bg: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-chats: #ffffff;
            --bg-messages: #e8e8e8;
            --text: #1a1a1a;
            --text-secondary: #666;
            --accent: #667eea;
            --accent-hover: #5a6fd6;
            --accent-light: #eef0ff;
            --border: #e0e0e0;
            --msg-sent: #667eea;
            --msg-sent-text: #ffffff;
            --msg-received: #ffffff;
            --msg-received-text: #1a1a1a;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --overlay: rgba(0,0,0,0.5);
            --action-sheet: #ffffff;
            --action-sheet-text: #1a1a1a;
            --danger: #ff3b30;
        }

        [data-theme="dark"] {
            --bg: #1a1a2e;
            --bg-secondary: #252540;
            --bg-chats: #1a1a2e;
            --bg-messages: #0f0f1a;
            --text: #e4e6eb;
            --text-secondary: #a0a3b0;
            --accent: #7c8aff;
            --accent-hover: #6a78f0;
            --accent-light: #252550;
            --border: #2a2a40;
            --msg-sent: #7c8aff;
            --msg-sent-text: #ffffff;
            --msg-received: #2a2a40;
            --msg-received-text: #e4e6eb;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
            --overlay: rgba(0,0,0,0.7);
            --action-sheet: #1e1e35;
            --action-sheet-text: #e4e6eb;
            --danger: #ff453a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0; left: 0;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        .app { display: flex; height: 100%; width: 100%; }

        .sidebar {
            width: 340px;
            background: var(--bg-chats);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h2 { font-size: 18px; font-weight: 700; }
        .sidebar-header .header-btns { display: flex; gap: 6px; }
        .sidebar-header button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .lobby-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 14px;
            cursor: pointer;
        }

        .chats-list { flex: 1; overflow-y: auto; }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid var(--border);
        }
        .chat-item:hover, .chat-item.active { background: var(--accent-light); }
        .chat-avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0;
        }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .chat-last { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread { background: var(--accent); color: #fff; border-radius: 12px; padding: 2px 7px; font-size: 10px; font-weight: 700; min-width: 18px; text-align: center; }

        .chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--bg-messages);
            position: relative;
            overflow: hidden;
        }

        .wallpaper {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-messages);
            background-image: url("data:image/svg+xml,%3Csvg width='240' height='240' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='40' cy='50' r='14' fill='%237c8aff' opacity='0.12'/%3E%3Ccircle cx='180' cy='70' r='9' fill='%237c8aff' opacity='0.08'/%3E%3Ccircle cx='100' cy='160' r='16' fill='%239b8aff' opacity='0.1'/%3E%3Ccircle cx='200' cy='190' r='7' fill='%237c8aff' opacity='0.06'/%3E%3Ccircle cx='60' cy='130' r='11' fill='%239b8aff' opacity='0.09'/%3E%3Ccircle cx='160' cy='30' r='6' fill='%237c8aff' opacity='0.07'/%3E%3Ccircle cx='30' cy='200' r='13' fill='%239b8aff' opacity='0.11'/%3E%3Ccircle cx='220' cy='120' r='8' fill='%237c8aff' opacity='0.05'/%3E%3C/svg%3E");
            background-size: 240px 240px;
            pointer-events: none;
            z-index: 0;
        }

        .chat-header {
            padding: 12px 16px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            z-index: 2;
            position: relative;
        }
        .back-arrow {
            display: none;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--accent);
            padding: 4px;
            flex-shrink: 0;
        }
        .chat-header-avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .chat-header-info { flex: 1; min-width: 0; cursor: pointer; }
        .chat-header-name { font-weight: 600; font-size: 14px; }
        .chat-header-status { font-size: 11px; color: var(--text-secondary); }
        .chat-header-actions { display: flex; gap: 4px; align-items: center; }
        .chat-header-actions button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 8px;
            color: var(--accent);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            position: relative;
            z-index: 1;
            -webkit-overflow-scrolling: touch;
        }

        .message { display: flex; margin-bottom: 4px; animation: msgIn 0.2s ease; }
        .message.own { justify-content: flex-end; }
        .message.system { justify-content: center; }

        .msg-bubble {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .message.own .msg-bubble { background: var(--msg-sent); color: var(--msg-sent-text); border-bottom-right-radius: 4px; }
        .message.received .msg-bubble { background: var(--msg-received); color: var(--msg-received-text); border-bottom-left-radius: 4px; }
        .message.system .msg-bubble { background: transparent; color: var(--text-secondary); font-size: 12px; font-style: italic; max-width: 90%; box-shadow: none; text-align: center; }

        .msg-sender { font-weight: 700; font-size: 11px; margin-bottom: 2px; }
        .message.own .msg-sender { color: rgba(255,255,255,0.8); }
        .message.received .msg-sender { color: var(--accent); }
        .msg-time { font-size: 10px; margin-top: 2px; text-align: right; opacity: 0.7; }
        .msg-edited { font-size: 10px; opacity: 0.6; margin-left: 4px; }
        .msg-image { max-width: 200px; max-height: 200px; border-radius: 10px; margin-top: 4px; cursor: pointer; }
        .msg-pinned { border-left: 3px solid #ff9800; }

        .input-area {
            padding: 8px 12px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            z-index: 2;
            position: relative;
        }
        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 22px;
            font-size: 15px;
            background: var(--bg-secondary);
            color: var(--text);
            outline: none;
            font-family: inherit;
        }
        .input-area input:focus { border-color: var(--accent); }
        .input-area button {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .attach-btn { background: var(--bg-secondary) !important; color: var(--text-secondary) !important; font-size: 16px !important; }

        .action-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay);
            z-index: 100;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }
        .action-overlay.show { display: flex; }
        .action-sheet {
            background: var(--action-sheet);
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-width: 500px;
            padding: 8px 0 24px;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .action-btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            border: none;
            background: none;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            color: var(--action-sheet-text);
            font-family: inherit;
        }
        .action-btn.danger { color: var(--danger); }
        .action-cancel {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            margin-top: 4px;
            font-family: inherit;
        }

        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-card {
            background: var(--bg);
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-card h3 { margin-bottom: 12px; font-size: 16px; }
        .modal-card input, .modal-card textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 8px;
            background: var(--bg-secondary);
            color: var(--text);
            font-family: inherit;
        }
        .modal-card button {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
            font-family: inherit;
        }
        .modal-card .cancel-btn { background: var(--bg-secondary); color: var(--text); }

        @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 100%; z-index: 50; transform: translateX(0); transition: transform 0.3s ease; }
            .sidebar.hidden { transform: translateX(-100%); }
            .back-arrow { display: block; }
            .msg-bubble { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Панель чатов -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>💬 Чаты</h2>
                <div class="header-btns">
                    <span class="lobby-link" onclick="goToLobby()">🏠 Лобби</span>
                    <button onclick="showNewChatModal()">+</button>
                    <button onclick="showCreateGroupModal()">👥</button>
                </div>
            </div>
            <div class="chats-list" id="chatsList">Загрузка...</div>
        </div>

        <!-- Окно чата -->
        <div class="chat-view" id="chatView">
            <div class="wallpaper"></div>
            <div class="chat-header">
                <button class="back-arrow" onclick="showSidebar()">←</button>
                <div class="chat-header-avatar" id="chatAvatar" onclick="openChatProfile()">🎵</div>
                <div class="chat-header-info" onclick="openChatProfile()">
                    <div class="chat-header-name" id="chatTitle">Старший хор «Пионерия»</div>
                    <div class="chat-header-status" id="chatStatus">Общий чат</div>
                </div>
                <div class="chat-header-actions">
                    <button id="chatSettingsBtn" onclick="openChatProfile()" style="display:none;">⚙️</button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div style="text-align:center;color:var(--text-secondary);padding:40px;">Загрузка...</div>
            </div>
            <div class="input-area">
                <button class="attach-btn" id="attachBtn">📎</button>
                <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <input type="file" id="imageInput" accept="image/*" style="display:none;">

    <div class="action-overlay" id="actionOverlay" onclick="closeActionSheet()">
        <div class="action-sheet" onclick="event.stopPropagation()">
            <button class="action-btn" onclick="editSelectedMsg()">✏️ Изменить</button>
            <button class="action-btn" onclick="pinSelectedMsg()">📌 Закрепить</button>
            <button class="action-btn danger" onclick="deleteSelectedMsg()">🗑️ Удалить</button>
            <button class="action-cancel" onclick="closeActionSheet()">Отмена</button>
        </div>
    </div>

    <div class="modal" id="userModal"><div class="modal-card">
        <h3>Новый диалог</h3>
        <input type="text" id="userSearch" placeholder="Поиск...">
        <div id="usersListModal"></div>
        <button class="cancel-btn" onclick="closeModal('userModal')">Отмена</button>
    </div></div>

    <div class="modal" id="groupModal"><div class="modal-card">
        <h3>Создать группу</h3>
        <input type="text" id="groupName" placeholder="Название">
        <div id="groupMembersList"></div>
        <button onclick="createGroup()">Создать</button>
        <button class="cancel-btn" onclick="closeModal('groupModal')">Отмена</button>
    </div></div>

    <div class="modal" id="editModal"><div class="modal-card">
        <h3>Редактировать</h3>
        <textarea id="editText" rows="3"></textarea>
        <button onclick="saveEdit()">Сохранить</button>
        <button class="cancel-btn" onclick="closeModal('editModal')">Отмена</button>
    </div></div>

    <div class="modal" id="profileModal"><div class="modal-card">
        <h3 id="profileTitle">Настройки чата</h3>
        <div id="profileContent"></div>
        <button class="cancel-btn" onclick="closeModal('profileModal')">Закрыть</button>
    </div></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const userData = JSON.parse(localStorage.getItem('user') || '{}');
        if (!userData.name) window.location.href = 'login.html';

        (function(){
            const t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
            fetch(`/api/user/settings?userId=${userData.id}&key=theme`)
                .then(r=>r.json()).then(d=>{if(d.success&&d.value)document.documentElement.setAttribute('data-theme',d.value);});
        })();

        let currentChatId = null;
        let currentChatType = 'general';
        let currentChatName = 'Старший хор «Пионерия»';
        let socket = null;
        let allChats = [];
        let allUsers = [];
        let selectedMsgId = null;
        let editingMsgId = null;

        function e(t){const d=document.createElement('div');d.textContent=t||'';return d.innerHTML;}
        function goToLobby(){ window.location.href = 'lobby.html'; }
        function showSidebar(){ document.getElementById('sidebar').classList.remove('hidden'); }
        function hideSidebar(){ if(window.innerWidth<=768) document.getElementById('sidebar').classList.add('hidden'); }
        function closeModal(id){ document.getElementById(id).classList.remove('show'); }

        async function loadChats(){
            try{
                const [usersRes, generalRes, chatsRes] = await Promise.all([
                    fetch('/api/users'),
                    fetch('/api/general-settings'),
                    fetch(`/api/chats?userId=${userData.id}`)
                ]);
                const users = await usersRes.json();
                const general = await generalRes.json();
                const chats = await chatsRes.json();

                if(users.success) allUsers = users.users;
                const generalName = general.success ? general.name : 'Старший хор «Пионерия»';

                const generalChat = { id: null, other_user_name: generalName, type: 'general', unread_count: 0, last_message: '' };
                
                // Получаем последнее сообщение общего чата
                try {
                    const gmRes = await fetch('/api/general-last-message');
                    const gmData = await gmRes.json();
                    if(gmData.success && gmData.message){
                        const txt = gmData.message.text||'';
                        generalChat.last_message = txt.startsWith('📷') ? '📷 Изображение' : txt;
                    }
                } catch(e){}
                
                allChats = [generalChat, ...(chats.success ? chats.chats : [])];
                renderChatsList();
                
                if(currentChatId === null) selectChat(null, generalName, 'general');
            } catch(err) { console.error(err); }
        }

        function renderChatsList(){
            const c = document.getElementById('chatsList');
            if(!allChats.length){ c.innerHTML='<div style="padding:20px;color:var(--text-secondary);">Нет чатов</div>'; return; }
            c.innerHTML = allChats.map(chat => {
                const active = currentChatId === chat.id;
                const av = chat.type === 'general' ? '🎵' : (chat.type === 'group' ? '👥' : (chat.other_user_name||'?')[0].toUpperCase());
                const name = chat.other_user_name || 'Чат';
                const last = chat.last_message || 'Нет сообщений';
                const unread = chat.unread_count > 0 ? `<span class="unread">${chat.unread_count}</span>` : '';
                const onclick = chat.id === null 
                    ? `selectChat(null,'${e(name)}','general')` 
                    : `selectChat(${chat.id},'${e(name)}','${chat.type||'private'}')`;
                return `<div class="chat-item ${active?'active':''}" onclick="${onclick}">
                    <div class="chat-avatar">${av}</div>
                    <div class="chat-info">
                        <div class="chat-name">${e(name)} ${unread}</div>
                        <div class="chat-last">${e(last.length>35?last.substring(0,35)+'...':last)}</div>
                    </div>
                </div>`;
            }).join('');
        }

        async function selectChat(chatId, name, type){
            if(currentChatId === chatId && socket?.connected) return;
            
            currentChatId = chatId;
            currentChatName = name;
            currentChatType = type;
            
            document.getElementById('chatTitle').textContent = name;
            document.getElementById('chatAvatar').textContent = name[0];
            document.getElementById('chatStatus').textContent = type==='group'?'Группа':(type==='general'?'Общий чат':'Личный чат');
            document.getElementById('chatSettingsBtn').style.display = (type==='group'||(type==='general'&&userData.role==='admin'))?'block':'none';

            hideSidebar();
            document.getElementById('messagesContainer').innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:40px;">Загрузка...</div>';

            if(socket){ socket.disconnect(); socket=null; }

            socket = io({ query: { chatId: chatId!==null?chatId.toString():'', userId: userData.id } });

            socket.on('connect', () => {
                console.log('✅ Socket connected');
                socket.emit('user joined', { name: userData.name, id: userData.id, role: userData.role });
            });

            socket.on('message history', msgs => {
                const cont = document.getElementById('messagesContainer');
                cont.innerHTML = '';
                if(msgs && msgs.length){
                    msgs.forEach(m => addMessage(m));
                } else {
                    cont.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:40px;">✨ Нет сообщений. Напишите что-нибудь!</div>';
                }
            });

            socket.on('message', m => {
                const mChatId = m.chat_id !== undefined ? m.chat_id : null;
                if(mChatId === currentChatId) addMessage(m);
                if(m.user_id !== userData.id) loadChats();
            });

            socket.on('message edited', d => {
                const el = document.querySelector(`[data-msg-id="${d.messageId}"] .msg-text`);
                if(el) el.textContent = d.newText;
            });

            socket.on('message deleted', msgId => {
                const el = document.querySelector(`[data-msg-id="${msgId}"]`);
                if(el) el.remove();
            });

            socket.on('connect_error', err => console.error('Socket error:', err));

            if(chatId !== null) {
                try { await fetch('/api/mark-read', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chatId, userId:userData.id}) }); } catch(e){}
            }

            renderChatsList();
        }

        function addMessage(data){
            const cont = document.getElementById('messagesContainer');
            if(cont.querySelector('div[style]') && !cont.querySelector('.message')) cont.innerHTML = '';
            
            const isOwn = data.user_id === userData.id;
            const isSystem = data.name === 'Система';
            
            const div = document.createElement('div');
            div.className = `message ${isSystem?'system':(isOwn?'own':'received')}`;
            div.setAttribute('data-msg-id', data.id);
            
            const time = new Date(data.timestamp).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
            
            let bubble = `<div class="msg-bubble" onclick="selectMessage('${data.id}')">`;
            if(!isSystem && !isOwn) bubble += `<div class="msg-sender">${e(data.name)}</div>`;
            if(data.text?.startsWith('📷')){
                bubble += `<img src="${data.text.replace('📷 ','')}" class="msg-image">`;
            } else {
                bubble += `<span class="msg-text">${e(data.text||'')}</span>`;
            }
            bubble += `<div class="msg-time">${time}${data.edited?'<span class="msg-edited">ред.</span>':''}</div>`;
            bubble += `</div>`;
            
            div.innerHTML = bubble;
            cont.appendChild(div);
            cont.scrollTop = cont.scrollHeight;
        }

        function selectMessage(id){
            selectedMsgId = id;
            document.getElementById('actionOverlay').classList.add('show');
        }
        function closeActionSheet(){
            document.getElementById('actionOverlay').classList.remove('show');
            selectedMsgId = null;
        }

        function editSelectedMsg(){
            closeActionSheet();
            editingMsgId = selectedMsgId;
            const el = document.querySelector(`[data-msg-id="${selectedMsgId}"] .msg-text`);
            document.getElementById('editText').value = el ? el.textContent : '';
            document.getElementById('editModal').classList.add('show');
        }

        async function saveEdit(){
            const text = document.getElementById('editText').value.trim();
            if(!text) return;
            await fetch('/api/edit-message', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({messageId:editingMsgId, newText:text, userId:userData.id, userRole:userData.role})
            });
            document.getElementById('editModal').classList.remove('show');
            editingMsgId = null;
        }

        async function pinSelectedMsg(){
            closeActionSheet();
            await fetch('/api/pin-message', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({messageId:selectedMsgId, chatId:currentChatId, userId:userData.id, userRole:userData.role})
            });
        }

        async function deleteSelectedMsg(){
            if(!confirm('Удалить сообщение?')){ closeActionSheet(); return; }
            closeActionSheet();
            await fetch('/api/delete-message', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({messageId:selectedMsgId, userId:userData.id, userRole:userData.role})
            });
        }

        function sendMessage(text, imageUrl){
            if(!socket?.connected){ alert('Нет соединения'); return; }
            socket.emit('chat message', {
                text: imageUrl ? `📷 ${imageUrl}` : text,
                chatId: currentChatId,
                chatType: currentChatType
            });
            document.getElementById('messageInput').value = '';
        }

        document.getElementById('sendBtn').addEventListener('click', ()=>{
            const msg = document.getElementById('messageInput').value.trim();
            if(msg) sendMessage(msg);
        });
        document.getElementById('messageInput').addEventListener('keydown', e=>{
            if(e.key==='Enter'&&!e.shiftKey){
                e.preventDefault();
                const msg = document.getElementById('messageInput').value.trim();
                if(msg) sendMessage(msg);
            }
        });

        document.getElementById('attachBtn').addEventListener('click', ()=>document.getElementById('imageInput').click());
        document.getElementById('imageInput').addEventListener('change', async ()=>{
            const file = document.getElementById('imageInput').files[0];
            if(!file) return;
            const fd = new FormData(); fd.append('image', file);
            const res = await fetch('/api/upload', {method:'POST', body:fd});
            const d = await res.json();
            if(d.success) sendMessage(null, d.url);
            document.getElementById('imageInput').value = '';
        });

        function showNewChatModal(){
            document.getElementById('userModal').classList.add('show');
            document.getElementById('usersListModal').innerHTML = allUsers.filter(u=>u.id!==userData.id).map(u=>
                `<div style="padding:10px;cursor:pointer;border-radius:8px;margin-bottom:4px;" onclick="startChat(${u.id},'${e(u.name)}')">
                    <strong>${e(u.name)}</strong><br><small>${e(u.email)}</small>
                </div>`
            ).join('');
        }

        document.getElementById('userSearch').addEventListener('input', function(){
            const q = this.value.toLowerCase();
            document.getElementById('usersListModal').innerHTML = allUsers.filter(u=>u.id!==userData.id&&(u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q)))
                .map(u=>`<div style="padding:10px;cursor:pointer;border-radius:8px;margin-bottom:4px;" onclick="startChat(${u.id},'${e(u.name)}')">
                    <strong>${e(u.name)}</strong><br><small>${e(u.email)}</small>
                </div>`).join('');
        });

        async function startChat(id, name){
            const res = await fetch('/api/get-or-create-chat', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:userData.id, otherUserId:id})});
            const d = await res.json();
            if(d.success){ closeModal('userModal'); await loadChats(); selectChat(d.chatId, name, 'private'); }
        }

        function showCreateGroupModal(){
            document.getElementById('groupModal').classList.add('show');
            document.getElementById('groupMembersList').innerHTML = allUsers.filter(u=>u.id!==userData.id).map(u=>
                `<div><input type="checkbox" value="${u.id}" id="u${u.id}"> <label for="u${u.id}">${e(u.name)}</label></div>`
            ).join('');
        }

        async function createGroup(){
            const name = document.getElementById('groupName').value.trim();
            if(!name){ alert('Введите название'); return; }
            const members = Array.from(document.querySelectorAll('#groupMembersList input:checked')).map(c=>parseInt(c.value));
            if(!members.length){ alert('Выберите участников'); return; }
            const res = await fetch('/api/create-group', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name, creatorId:userData.id, members})});
            const d = await res.json();
            if(d.success){ closeModal('groupModal'); await loadChats(); selectChat(d.chatId, name, 'group'); }
        }

        function openChatProfile(){
            const modal = document.getElementById('profileModal');
            const title = document.getElementById('profileTitle');
            const content = document.getElementById('profileContent');
            
            if(currentChatType === 'general' && userData.role === 'admin'){
                title.textContent = 'Настройки общего чата';
                content.innerHTML = `<input type="text" id="renameInput" value="${e(currentChatName)}"><button onclick="renameGeneralChat()">Сохранить</button>`;
                modal.classList.add('show');
            } else if(currentChatType === 'group'){
                title.textContent = 'Настройки группы';
                content.innerHTML = `<input type="text" id="renameInput" value="${e(currentChatName)}"><button onclick="renameGroup()">Сохранить</button>`;
                modal.classList.add('show');
            }
        }

        async function renameGeneralChat(){
            const name = document.getElementById('renameInput').value.trim();
            if(!name) return;
            await fetch('/api/admin/update-general-chat', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminEmail:userData.email, newName:name})});
            currentChatName = name;
            document.getElementById('chatTitle').textContent = name;
            closeModal('profileModal');
            loadChats();
        }

        async function renameGroup(){
            const name = document.getElementById('renameInput').value.trim();
            if(!name) return;
            await fetch('/api/rename-group', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chatId:currentChatId, newName:name, userId:userData.id, userRole:userData.role})});
            currentChatName = name;
            document.getElementById('chatTitle').textContent = name;
            closeModal('profileModal');
            loadChats();
        }

        async function initPush(){
            if(!('serviceWorker' in navigator)) return;
            try{ await navigator.serviceWorker.register('/service-worker.js'); } catch(e){}
            if('Notification' in window && Notification.permission === 'default') await Notification.requestPermission();
        }
        initPush();

        loadChats();
    </script>
</body>
</html>
