<!DOCTYPE html>
<html lang="ru">
<head>
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Pioneria Messenger</title>
    <link rel="icon" type="image/jpg" href="/favicon.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root, [data-theme="light"] {
            --bg: #ffffff; --bg2: #f5f5f5; --bg-chat: #e8e8e8;
            --text: #1a1a1a; --text2: #666; --accent: #667eea;
            --border: #e0e0e0; --msg-sent: #667eea; --msg-sent-text: #fff;
            --msg-rec: #fff; --msg-rec-text: #1a1a1a;
            --overlay: rgba(0,0,0,0.5); --danger: #ff3b30;
        }

        [data-theme="dark"] {
            --bg: #1a1a2e; --bg2: #252540; --bg-chat: #0f0f1a;
            --text: #e4e6eb; --text2: #a0a3b0; --accent: #7c8aff;
            --border: #2a2a40; --msg-sent: #7c8aff; --msg-sent-text: #fff;
            --msg-rec: #2a2a40; --msg-rec-text: #e4e6eb;
            --overlay: rgba(0,0,0,0.7); --danger: #ff453a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            height: 100vh; height: -webkit-fill-available;
            overflow: hidden; position: fixed;
            width: 100%; top: 0; left: 0;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        .app { display: flex; height: 100%; width: 100%; }

        .sidebar {
            width: 340px; background: var(--bg);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            height: 100%; flex-shrink: 0; z-index: 10;
        }
        .sidebar-header {
            padding: 14px 16px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar-header h2 { font-size: 17px; font-weight: 700; }
        .sidebar-header button {
            background: var(--accent); color: #fff; border: none;
            padding: 7px 12px; border-radius: 18px; font-size: 12px;
            font-weight: 600; cursor: pointer; margin-left: 4px;
        }
        .lobby-btn { background: transparent !important; color: var(--accent) !important; }

        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px; cursor: pointer;
            transition: background 0.15s; border-bottom: 1px solid var(--border);
        }
        .chat-item:hover, .chat-item.active { background: var(--bg2); }
        .chat-avatar {
            width: 46px; height: 46px; border-radius: 50%;
            background: var(--accent); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 17px; flex-shrink: 0;
            overflow: hidden;
        }
        .chat-avatar img { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .chat-last { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread { background: var(--accent); color: #fff; border-radius: 10px; padding: 1px 6px; font-size: 10px; font-weight: 700; }

        .chat-view {
            flex: 1; display: flex; flex-direction: column;
            height: 100%; background: var(--bg-chat); position: relative;
        }

        .wallpaper {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-chat);
            background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='40' r='12' fill='%237c8aff' opacity='0.1'/%3E%3Ccircle cx='150' cy='80' r='8' fill='%237c8aff' opacity='0.07'/%3E%3Ccircle cx='90' cy='150' r='14' fill='%239b8aff' opacity='0.09'/%3E%3Ccircle cx='170' cy='170' r='6' fill='%237c8aff' opacity='0.05'/%3E%3C/svg%3E");
            background-size: 200px 200px; pointer-events: none; z-index: 0;
        }

        .chat-header {
            padding: 10px 14px; background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
            flex-shrink: 0; z-index: 2;
        }
        .back-arrow {
            display: none; background: none; border: none;
            font-size: 20px; cursor: pointer; color: var(--accent); padding: 4px;
        }
        .chat-header-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: var(--accent); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px; flex-shrink: 0; cursor: pointer;
            overflow: hidden;
        }
        .chat-header-avatar img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
        .chat-header-info { flex: 1; min-width: 0; cursor: pointer; }
        .chat-header-name { font-weight: 600; font-size: 13px; }
        .chat-header-status { font-size: 10px; color: var(--text2); }

        .messages-container {
            flex: 1; overflow-y: auto; padding: 10px 14px;
            position: relative; z-index: 1; -webkit-overflow-scrolling: touch;
        }

        .msg-row { display: flex; margin-bottom: 4px; align-items: flex-end; gap: 6px; }
        .msg-row.own { justify-content: flex-end; }
        .msg-row.system { justify-content: center; }
        
        .msg-avatar-small {
            width: 26px; height: 26px; border-radius: 50%;
            background: var(--accent); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 10px; flex-shrink: 0;
            overflow: hidden; margin-bottom: 2px;
        }
        .msg-avatar-small img { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
        
        .msg-bubble {
            max-width: 70%; padding: 7px 10px; border-radius: 14px;
            font-size: 13px; line-height: 1.4; word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04); cursor: pointer;
            animation: fadeIn 0.15s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .msg-row.own .msg-bubble { background: var(--msg-sent); color: var(--msg-sent-text); border-bottom-right-radius: 4px; }
        .msg-row.rec .msg-bubble { background: var(--msg-rec); color: var(--msg-rec-text); border-bottom-left-radius: 4px; }
        .msg-row.system .msg-bubble { background: transparent; color: var(--text2); font-size: 11px; font-style: italic; box-shadow: none; max-width: 90%; }
        .msg-sender { font-weight: 700; font-size: 10px; margin-bottom: 1px; }
        .msg-row.rec .msg-sender { color: var(--accent); }
        .msg-time { font-size: 9px; opacity: 0.6; text-align: right; margin-top: 2px; }
        .msg-image { max-width: 180px; max-height: 180px; border-radius: 8px; margin-top: 3px; cursor: pointer; }

        .input-area {
            padding: 8px 12px; background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px;
            flex-shrink: 0; z-index: 2;
        }
        .input-area input {
            flex: 1; padding: 9px 14px; border: 1px solid var(--border);
            border-radius: 20px; font-size: 14px; background: var(--bg2);
            color: var(--text); outline: none; font-family: inherit;
        }
        .input-area button {
            width: 36px; height: 36px; border-radius: 50%;
            border: none; background: var(--accent); color: #fff;
            font-size: 16px; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .attach-btn { background: var(--bg2) !important; color: var(--text2) !important; }

        .as-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay); z-index: 100;
            display: none; align-items: flex-end; justify-content: center;
        }
        .as-overlay.show { display: flex; }
        .as-sheet {
            background: var(--bg); border-radius: 14px 14px 0 0;
            width: 100%; max-width: 500px; padding: 6px 0 20px;
            animation: slideUp 0.2s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .as-btn {
            display: block; width: 100%; padding: 13px 20px;
            border: none; background: none; font-size: 15px;
            text-align: left; cursor: pointer; color: var(--text); font-family: inherit;
        }
        .as-btn.danger { color: var(--danger); }
        .as-cancel {
            display: block; width: 100%; padding: 13px;
            border: none; background: none; font-size: 15px; font-weight: 600;
            cursor: pointer; color: var(--text2); font-family: inherit;
        }

        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay); z-index: 200;
            display: none; align-items: center; justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-card {
            background: var(--bg); border-radius: 14px; padding: 18px;
            width: 90%; max-width: 380px; max-height: 75vh; overflow-y: auto;
        }
        .modal-card h3 { margin-bottom: 10px; font-size: 15px; }
        .modal-card input, .modal-card textarea {
            width: 100%; padding: 9px; border: 1px solid var(--border);
            border-radius: 8px; font-size: 13px; margin-bottom: 6px;
            background: var(--bg2); color: var(--text); font-family: inherit;
        }
        .modal-card button {
            width: 100%; padding: 9px; background: var(--accent);
            color: #fff; border: none; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 4px;
        }
        .modal-card .cbtn { background: var(--bg2); color: var(--text); }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 100%; z-index: 50; }
            .sidebar.hidden { transform: translateX(-100%); }
            .back-arrow { display: block; }
            .msg-bubble { max-width: 80%; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>💬 Чаты</h2>
                <div>
                    <button class="lobby-btn" onclick="goToLobby()">🏠 Лобби</button>
                    <button onclick="showNewChat()">+</button>
                    <button onclick="showCreateGroup()">👥</button>
                </div>
            </div>
            <div class="chats-list" id="chatsList"></div>
        </div>

        <div class="chat-view" id="chatView">
            <div class="wallpaper"></div>
            <div class="chat-header">
                <button class="back-arrow" onclick="showSidebar()">←</button>
                <div class="chat-header-avatar" id="chatAvatar">🎵</div>
                <div class="chat-header-info" onclick="openChatSettings()">
                    <div class="chat-header-name" id="chatTitle">Старший хор</div>
                    <div class="chat-header-status" id="chatStatus">Общий чат</div>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <button class="attach-btn" id="attachBtn">📎</button>
                <input type="text" id="msgInput" placeholder="Сообщение..." autocomplete="off">
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <input type="file" id="imageInput" accept="image/*" style="display:none;">

    <div class="as-overlay" id="asOverlay" onclick="closeAS()">
        <div class="as-sheet" onclick="event.stopPropagation()">
            <button class="as-btn" onclick="editMsg()">✏️ Изменить</button>
            <button class="as-btn" onclick="pinMsg()">📌 Закрепить</button>
            <button class="as-btn danger" onclick="deleteMsg()">🗑️ Удалить</button>
            <button class="as-cancel" onclick="closeAS()">Отмена</button>
        </div>
    </div>

    <div class="modal" id="userModal"><div class="modal-card">
        <h3>Новый диалог</h3>
        <input type="text" id="userSearch" placeholder="Поиск...">
        <div id="usersList"></div>
        <button class="cbtn" onclick="closeM('userModal')">Отмена</button>
    </div></div>

    <div class="modal" id="groupModal"><div class="modal-card">
        <h3>Создать группу</h3>
        <input type="text" id="groupName" placeholder="Название">
        <div id="groupMembers"></div>
        <button onclick="createGroup()">Создать</button>
        <button class="cbtn" onclick="closeM('groupModal')">Отмена</button>
    </div></div>

    <div class="modal" id="editModal"><div class="modal-card">
        <h3>Редактировать</h3>
        <textarea id="editText" rows="3"></textarea>
        <button onclick="saveEdit()">Сохранить</button>
        <button class="cbtn" onclick="closeM('editModal')">Отмена</button>
    </div></div>

    <div class="modal" id="settingsModal"><div class="modal-card">
        <h3 id="settingsTitle">Настройки</h3>
        <div id="settingsContent"></div>
        <button class="cbtn" onclick="closeM('settingsModal')">Закрыть</button>
    </div></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const userData = JSON.parse(localStorage.getItem('user') || '{}');
        if (!userData.name) window.location.href = 'login.html';

        (function(){
            const t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();

        let currentChatId = null, currentChatType = 'general', currentChatName = 'Старший хор «Пионерия»';
        let socket = null, allChats = [], allUsers = [], userAvatars = {};
        let selectedMsgId = null, editingMsgId = null;

        const $ = id => document.getElementById(id);
        function esc(t){ const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }
        function goToLobby(){ window.location.href='lobby.html'; }
        function showSidebar(){ $('sidebar').classList.remove('hidden'); }
        function hideSidebar(){ if(window.innerWidth<=768) $('sidebar').classList.add('hidden'); }
        function closeM(id){ $(id).classList.remove('show'); }
        function closeAS(){ $('asOverlay').classList.remove('show'); selectedMsgId=null; }

        function formatTime(ts){
            if(!ts) return '';
            const d=new Date(ts), now=new Date();
            if(d.toDateString()===now.toDateString()) return `Сегодня, ${d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}`;
            return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
        }

        function getUserAvatarHTML(uid, uname){
            if(userAvatars[uid]) return `<img src="${userAvatars[uid]}">`;
            return (uname||'?')[0].toUpperCase();
        }

        async function loadChats(){
            try{
                const [uRes,gRes,cRes]=await Promise.all([
                    fetch('/api/users'),
                    fetch('/api/general-settings'),
                    fetch(`/api/chats?userId=${userData.id}`)
                ]);
                const [uData,gData,cData]=await Promise.all([uRes.json(),gRes.json(),cRes.json()]);

                if(uData.success){
                    allUsers=uData.users;
                    userAvatars={};
                    allUsers.forEach(u=>{ userAvatars[u.id]=u.avatar_url; });
                }
                const gName=gData.success?gData.name:'Старший хор «Пионерия»';
                currentChatName=gName;

                let lastMsg='';
                try{
                    const gm=await fetch('/api/general-last-message');
                    const gmd=await gm.json();
                    if(gmd.success&&gmd.message){
                        const t=gmd.message.text||'';
                        lastMsg=t.startsWith('📷')?'📷 Изображение':t;
                    }
                }catch(e){}

                const general={id:null,other_user_name:gName,type:'general',unread_count:0,last_message:lastMsg};
                allChats=[general,...(cData.success?cData.chats:[])];
                renderChats();
                if(currentChatId===null) selectChat(null,gName,'general');
            }catch(e){console.error(e);}
        }

        function renderChats(){
            const c=$('chatsList');
            if(!allChats.length){c.innerHTML='<div style="padding:20px;color:var(--text2);">Нет чатов</div>';return;}
            c.innerHTML=allChats.map(chat=>{
                const act=currentChatId===chat.id;
                let avHtml='';
                if(chat.type==='general')avHtml='<div class="chat-avatar">🎵</div>';
                else if(chat.type==='group')avHtml='<div class="chat-avatar">👥</div>';
                else if(chat.other_user_avatar)avHtml=`<div class="chat-avatar"><img src="${chat.other_user_avatar}"></div>`;
                else{
                    const letter=(chat.other_user_name||'?')[0].toUpperCase();
                    avHtml=`<div class="chat-avatar">${letter}</div>`;
                }
                const nm=chat.other_user_name||'Чат';
                const last=chat.last_message||'Нет сообщений';
                const unr=chat.unread_count>0?`<span class="unread">${chat.unread_count}</span>`:'';
                const click=chat.id===null?`selectChat(null,'${esc(nm)}','general')`:`selectChat(${chat.id},'${esc(nm)}','${chat.type||'private'}')`;
                return `<div class="chat-item ${act?'active':''}" onclick="${click}">${avHtml}<div class="chat-info"><div class="chat-name">${esc(nm)} ${unr}</div><div class="chat-last">${esc(last.length>30?last.substring(0,30)+'...':last)}</div></div></div>`;
            }).join('');
        }

        function selectChat(id,name,type){
            if(currentChatId===id&&socket?.connected)return;
            currentChatId=id;currentChatName=name;currentChatType=type;
            $('chatTitle').textContent=name;
            $('chatAvatar').innerHTML=getUserAvatarHTML(null,name);
            $('chatStatus').textContent=type==='group'?'Группа':(type==='general'?'Общий чат':'Личный чат');
            hideSidebar();
            $('messagesContainer').innerHTML='';

            if(socket){socket.disconnect();socket=null;}

            socket=io({query:{chatId:id!==null?id.toString():'',userId:userData.id}});

            socket.on('connect',()=>{
                socket.emit('user joined',{name:userData.name,id:userData.id,role:userData.role});
            });

            socket.on('message history',msgs=>{
                $('messagesContainer').innerHTML='';
                if(msgs&&msgs.length)msgs.forEach(m=>addMsg(m));
                else $('messagesContainer').innerHTML='<div style="text-align:center;color:var(--text2);padding:40px;">✨ Нет сообщений</div>';
            });

            socket.on('message',m=>{
                if((m.chat_id||null)===currentChatId)addMsg(m);
                if(m.user_id!==userData.id)loadChats();
            });

            socket.on('message edited',d=>{
                const el=document.querySelector(`[data-id="${d.messageId}"] .msg-text`);
                if(el){el.textContent=d.newText;el.parentElement.querySelector('.msg-time').innerHTML+= ' (ред.)';}
            });

            socket.on('message deleted',mid=>{
                const el=document.querySelector(`[data-id="${mid}"]`);
                if(el)el.remove();
            });

            if(id!==null){
                try{fetch('/api/mark-read',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chatId:id,userId:userData.id})});}catch(e){}
            }

            renderChats();
        }

        function addMsg(data){
            const c=$('messagesContainer');
            if(c.querySelector('div[style]'))c.innerHTML='';
            
            const own=data.user_id===userData.id;
            const sys=data.name==='Система';

            const row=document.createElement('div');
            row.className=`msg-row ${sys?'system':(own?'own':'rec')}`;
            row.setAttribute('data-id',String(data.id));
            if(data.image_url)row.setAttribute('data-image-url',data.image_url);

            const time=formatTime(data.timestamp);
            const avHtml= (!sys&&!own) ? `<div class="msg-avatar-small">${getUserAvatarHTML(data.user_id,data.name)}</div>` : '';

            let html= avHtml + `<div class="msg-bubble" onclick="selectMsg('${data.id}')">`;
            if(!sys&&!own)html+=`<div class="msg-sender">${esc(data.name)}</div>`;
            if(data.text?.startsWith('📷')){
                html+=`<img src="${data.text.replace('📷 ','')}" class="msg-image">`;
            }else{
                html+=`<span class="msg-text">${esc(data.text||'')}</span>`;
            }
            html+=`<div class="msg-time">${time}${data.edited?' (ред.)':''}</div>`;
            html+=`</div>`;

            row.innerHTML=html;
            c.appendChild(row);
            c.scrollTop=c.scrollHeight;
        }

        function selectMsg(id){selectedMsgId=id;$('asOverlay').classList.add('show');}

        function editMsg(){
            closeAS();editingMsgId=selectedMsgId;
            const el=document.querySelector(`[data-id="${selectedMsgId}"] .msg-text`);
            $('editText').value=el?el.textContent:'';
            $('editModal').classList.add('show');
        }

        async function saveEdit(){
            const t=$('editText').value.trim();if(!t){alert('Введите текст');return;}
            try{
                const res=await fetch('/api/edit-message',{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({messageId:parseInt(editingMsgId),newText:t,userId:userData.id,userRole:userData.role})
                });
                const d=await res.json();
                if(!d.success)alert(d.error||'Ошибка');
            }catch(e){console.error(e);}
            closeM('editModal');editingMsgId=null;
        }

        async function pinMsg(){
            closeAS();
            try{
                const res=await fetch('/api/pin-message',{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({messageId:parseInt(selectedMsgId),chatId:currentChatId,userId:userData.id,userRole:userData.role})
                });
                const d=await res.json();
                if(d.success)alert(d.pinned?'📌 Закреплено':'📌 Откреплено');
                else alert(d.error||'Ошибка');
            }catch(e){console.error(e);}
        }

        async function deleteMsg(){
            if(!confirm('Удалить сообщение?')){closeAS();return;}
            closeAS();
            const msgEl=document.querySelector(`[data-id="${selectedMsgId}"]`);
            const imageUrl=msgEl?msgEl.getAttribute('data-image-url')||'':'';
            try{
                const res=await fetch('/api/delete-message',{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({messageId:parseInt(selectedMsgId),userId:userData.id,userRole:userData.role,imageUrl})
                });
                const d=await res.json();
                if(!d.success)alert(d.error||'Ошибка');
            }catch(e){console.error(e);}
        }

        function send(text,img){
            if(!socket?.connected){alert('Нет соединения');return;}
            socket.emit('chat message',{text:img?`📷 ${img}`:text,chatId:currentChatId,chatType:currentChatType});
            $('msgInput').value='';
        }

        $('sendBtn').onclick=()=>{const t=$('msgInput').value.trim();if(t)send(t);};
        $('msgInput').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();const t=$('msgInput').value.trim();if(t)send(t);}};
        $('attachBtn').onclick=()=>$('imageInput').click();
        $('imageInput').onchange=async()=>{
            const f=$('imageInput').files[0];if(!f)return;
            const fd=new FormData();fd.append('image',f);
            const r=await fetch('/api/upload',{method:'POST',body:fd});
            const d=await r.json();
            if(d.success)send(null,d.url);
            $('imageInput').value='';
        };

        function showNewChat(){
            $('userModal').classList.add('show');
            $('usersList').innerHTML=allUsers.filter(u=>u.id!==userData.id).map(u=>
                `<div style="padding:8px;cursor:pointer;border-radius:6px;" onclick="startChat(${u.id},'${esc(u.name)}')"><strong>${esc(u.name)}</strong><br><small>${esc(u.email)}</small></div>`
            ).join('');
        }

        $('userSearch').oninput=function(){
            const q=this.value.toLowerCase();
            $('usersList').innerHTML=allUsers.filter(u=>u.id!==userData.id&&(u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q)))
                .map(u=>`<div style="padding:8px;cursor:pointer;border-radius:6px;" onclick="startChat(${u.id},'${esc(u.name)}')"><strong>${esc(u.name)}</strong><br><small>${esc(u.email)}</small></div>`).join('');
        };

        async function startChat(id,name){
            const r=await fetch('/api/get-or-create-chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:userData.id,otherUserId:id})});
            const d=await r.json();
            if(d.success){closeM('userModal');loadChats();selectChat(d.chatId,name,'private');}
        }

        function showCreateGroup(){
            $('groupModal').classList.add('show');
            $('groupMembers').innerHTML=allUsers.filter(u=>u.id!==userData.id).map(u=>
                `<div><input type="checkbox" value="${u.id}"> ${esc(u.name)}</div>`).join('');
        }

        async function createGroup(){
            const name=$('groupName').value.trim();if(!name){alert('Название');return;}
            const members=[...$('groupMembers').querySelectorAll('input:checked')].map(c=>parseInt(c.value));
            if(!members.length){alert('Участники');return;}
            const r=await fetch('/api/create-group',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,creatorId:userData.id,members})});
            const d=await r.json();
            if(d.success){closeM('groupModal');loadChats();selectChat(d.chatId,name,'group');}
        }

        function openChatSettings(){
            if(currentChatType==='general'&&userData.role==='admin'){
                $('settingsTitle').textContent='Общий чат';
                $('settingsContent').innerHTML=`<input type="text" id="renameInput" value="${esc(currentChatName)}"><button onclick="renameGeneral()">Сохранить</button>`;
                $('settingsModal').classList.add('show');
            }else if(currentChatType==='group'){
                $('settingsTitle').textContent='Группа';
                $('settingsContent').innerHTML=`<input type="text" id="renameInput" value="${esc(currentChatName)}"><button onclick="renameGroup()">Сохранить</button>`;
                $('settingsModal').classList.add('show');
            }
        }

        async function renameGeneral(){
            const n=document.getElementById('renameInput').value.trim();if(!n)return;
            await fetch('/api/admin/update-general-chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminEmail:userData.email,newName:n})});
            currentChatName=n;$('chatTitle').textContent=n;closeM('settingsModal');loadChats();
        }

        async function renameGroup(){
            const n=document.getElementById('renameInput').value.trim();if(!n)return;
            await fetch('/api/rename-group',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chatId:currentChatId,newName:n,userId:userData.id,userRole:userData.role})});
            currentChatName=n;$('chatTitle').textContent=n;closeM('settingsModal');loadChats();
        }

        loadChats();
    </script>
</body>
</html>
