<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pioneria Messenger</title>
    <link rel="icon" type="image/jpg" href="/favicon.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }
        
        /* Главный контейнер */
        .messenger {
            display: flex;
            height: 100vh;
            width: 100%;
            background: white;
            overflow: hidden;
        }
        
        /* Левая панель */
        .chats-panel {
            width: 320px;
            background: #f9f9f9;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        /* Правая панель */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f9f9f9;
            height: 100vh;
            overflow: hidden;
            min-width: 0;
        }
        
        /* Шапка чата */
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .chat-header h2 {
            font-size: 1.1rem;
            color: #333;
        }
        .lobby-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        
        /* Область сообщений */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* Стили сообщений */
        .message {
            display: flex;
            position: relative;
        }
        .message-own {
            justify-content: flex-end;
        }
        .message-other {
            justify-content: flex-start;
        }
        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }
        .message-own .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-other .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message-name {
            font-size: 12px;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .message-own .message-name {
            text-align: right;
            color: rgba(255,255,255,0.8);
        }
        .message-other .message-name {
            color: #667eea;
        }
        .message-text {
            font-size: 14px;
            line-height: 1.4;
        }
        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            text-align: right;
        }
        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 5px;
            cursor: pointer;
        }
        
        /* Кнопка удаления */
        .delete-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            display: none;
            z-index: 10;
        }
        .message.selected .message-bubble {
            outline: 2px solid #ff4444;
        }
        .message.selected .delete-btn {
            display: block;
        }
        
        /* Форма отправки */
        .message-form {
            display: flex;
            padding: 15px;
            border-top: 1px solid #eee;
            background: white;
            gap: 8px;
            flex-shrink: 0;
        }
        #messageInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            min-width: 0;
        }
        #messageInput:focus {
            border-color: #667eea;
            outline: none;
        }
        .message-form button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .attach-button {
            background: #e0e0e0;
            color: #666;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        
        /* Элементы левой панели */
        .chats-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            background: white;
        }
        .chats-header h2 {
            font-size: 1.2rem;
            color: #667eea;
            margin-bottom: 10px;
        }
        .new-chat-btn {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .chat-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-item:hover {
            background: #f0f0f0;
        }
        .chat-item.active {
            background: #e3f2fd;
            border-left: 3px solid #667eea;
        }
        .chat-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        .chat-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
        }
        .chat-last-message {
            font-size: 12px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .unread-badge {
            background: #ff4444;
            color: white;
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 8px;
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            max-height: 80%;
            overflow-y: auto;
        }
        .user-item {
            padding: 12px;
            background: #f5f5f5;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .empty-messages {
            text-align: center;
            color: #999;
            padding: 40px;
        }
        
        /* Мобильная версия */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            background: #667eea;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
            .chats-panel {
                position: fixed;
                left: -100%;
                width: 280px;
                height: 100%;
                z-index: 1000;
                transition: left 0.3s ease;
                background: #f9f9f9;
            }
            .chats-panel.open {
                left: 0;
            }
            .chat-header {
                padding-left: 60px;
            }
            .message-bubble {
                max-width: 85%;
            }
            .message-form {
                padding: 10px;
            }
            #messageInput {
                font-size: 14px;
                padding: 10px;
            }
            .message-form button {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" onclick="toggleChatsPanel()">☰</button>
    
    <div class="messenger">
        <div class="chats-panel" id="chatsPanel">
            <div class="chats-header">
                <h2>💬 Диалоги</h2>
                <button class="new-chat-btn" onclick="showNewChatModal()">➕ Новый диалог</button>
            </div>
            <div class="chats-list" id="chatsList">Загрузка...</div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <h2 id="currentChatTitle">Выберите чат</h2>
                <button class="lobby-btn" onclick="goToLobby()">🏠 Лобби</button>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-messages">Выберите чат, чтобы начать общение</div>
            </div>
            <form class="message-form" id="chatForm" style="display: none;">
                <button type="button" id="imageButton" class="attach-button">📎</button>
                <input type="text" id="messageInput" autocomplete="off" placeholder="Введите сообщение...">
                <button type="submit">Отправить</button>
            </form>
        </div>
    </div>
    <input type="file" id="imageInput" accept="image/*" style="display: none;">
    
    <div id="userModal" class="modal">
        <div class="modal-content">
            <h3>Выберите пользователя</h3>
            <input type="text" id="userSearch" placeholder="Поиск по имени или email...">
            <div id="usersListModal"></div>
            <button onclick="closeModal()" style="margin-top: 15px; width: 100%; background: #666;">Отмена</button>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const userData = JSON.parse(localStorage.getItem('user') || '{}');
        if (!userData.name) window.location.href = 'login.html';
        
        let currentChatId = null;
        let currentChatName = '';
        let currentUserId = userData.id;
        let socket = null;
        let allChats = [];
        let allUsers = [];
        let selectedMessageElement = null;
        
        const notificationSound = new Audio('/notification.mp3');
        
        if ('Notification' in window && Notification.permission !== 'granted') {
            setTimeout(() => Notification.requestPermission(), 2000);
        }
        
        function toggleChatsPanel() {
            document.getElementById('chatsPanel').classList.toggle('open');
        }
        
        function goToLobby() { window.location.href = 'lobby.html'; }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const now = new Date();
            const isToday = date.toDateString() === now.toDateString();
            if (isToday) return `Сегодня, ${date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}`;
            return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        }
        
        function selectMessage(element, messageId) {
            if (selectedMessageElement) selectedMessageElement.classList.remove('selected');
            element.classList.add('selected');
            selectedMessageElement = element;
        }
        
        async function deleteMessage(messageId, imageUrl = null) {
            try {
                const response = await fetch('/api/delete-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messageId, userId: currentUserId, userRole: userData.role, imageUrl })
                });
                const result = await response.json();
                if (result.success) {
                    const el = document.querySelector(`.message[data-id='${messageId}']`);
                    if (el) el.remove();
                    if (selectedMessageElement === el) selectedMessageElement = null;
                } else {
                    alert(result.error || 'Нельзя удалить');
                }
            } catch (err) { alert('Ошибка удаления'); }
        }
        
        async function loadChats() {
            try {
                const general = { id: null, other_user_name: 'Чат старшего хора', unread_count: 0 };
                const res = await fetch(`/api/chats?userId=${userData.id}`);
                const data = await res.json();
                allChats = data.success && data.chats ? [general, ...data.chats] : [general];
                renderChatsList();
                setTimeout(() => selectChat(null, 'Чат старшего хора'), 100);
            } catch(e) { console.error(e); }
        }
        
        function renderChatsList() {
            const container = document.getElementById('chatsList');
            if (!allChats.length) { container.innerHTML = '<div style="padding:20px">Нет чатов</div>'; return; }
            let html = '';
            for (let chat of allChats) {
                const active = currentChatId === chat.id;
                const avatar = chat.other_user_name ? chat.other_user_name.charAt(0).toUpperCase() : '🌟';
                const lastMsg = chat.last_message ? (chat.last_message.length > 30 ? chat.last_message.substring(0,30)+'...' : chat.last_message) : 'Нет сообщений';
                html += `<div class="chat-item ${active ? 'active' : ''}" onclick="selectChat(${chat.id === null ? 'null' : chat.id}, '${escapeHtml(chat.other_user_name)}')">
                            <div class="chat-avatar">${avatar}</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(chat.other_user_name)}${chat.unread_count ? `<span class="unread-badge">${chat.unread_count}</span>` : ''}</div>
                                <div class="chat-last-message">${escapeHtml(lastMsg)}</div>
                            </div>
                        </div>`;
            }
            container.innerHTML = html;
        }
        
        async function selectChat(chatId, chatName) {
            currentChatId = chatId;
            currentChatName = chatName;
            document.getElementById('currentChatTitle').textContent = chatName;
            document.getElementById('chatForm').style.display = 'flex';
            if (socket) socket.disconnect();
            socket = io({ query: { chatId: chatId !== null ? chatId : '' } });
            socket.on('connect', () => socket.emit('user joined', { name: userData.name, id: userData.id, role: userData.role }));
            socket.on('message history', (msgs) => {
                const container = document.getElementById('messagesContainer');
                container.innerHTML = '';
                if (msgs?.length) msgs.forEach(m => addMessageToUI(m));
                else container.innerHTML = '<div class="empty-messages">Нет сообщений. Напишите что-нибудь!</div>';
            });
            socket.on('message', (m) => addMessageToUI(m));
            if (chatId) await fetch('/api/mark-read', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chatId, userId: currentUserId }) });
            renderChatsList();
            if (window.innerWidth <= 768) document.getElementById('chatsPanel').classList.remove('open');
        }
        
        function addMessageToUI(data) {
            const container = document.getElementById('messagesContainer');
            if (container.innerHTML.includes('empty-messages')) container.innerHTML = '';
            const isOwn = data.user_id === currentUserId;
            const canDelete = (data.user_id === currentUserId) || userData.role === 'admin';
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
            div.setAttribute('data-id', data.id);
            let content = `<div class="message-bubble">`;
            if (!isOwn) content += `<div class="message-name">${escapeHtml(data.name)}</div>`;
            if (data.text?.startsWith('📷')) {
                const url = data.text.replace('📷 ', '');
                content += `<div class="message-text"><a href="${url}" target="_blank"><img src="${url}" class="message-image"></a></div>`;
            } else {
                content += `<div class="message-text">${escapeHtml(data.text)}</div>`;
            }
            content += `<div class="message-time">${formatTime(data.timestamp)}</div>`;
            if (canDelete) content += `<button class="delete-btn" onclick="event.stopPropagation(); deleteMessage('${data.id}', '${data.image_url || ''}')">🗑️</button>`;
            content += `</div>`;
            div.innerHTML = content;
            div.addEventListener('click', (e) => { if (!e.target.classList.contains('delete-btn')) selectMessage(div, data.id); });
            container.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'end' });
            if (data.user_id !== currentUserId && !document.hasFocus()) {
                notificationSound.play().catch(()=>{});
                if (Notification.permission === 'granted') new Notification('Новое сообщение', { body: `${data.name}: ${data.text.substring(0,50)}`, icon: '/favicon.jpg' });
            }
        }
        
        async function sendMessage(text, imageUrl = null) {
            if (!socket) return alert('Нет соединения');
            const finalText = imageUrl ? `📷 ${imageUrl}` : text;
            socket.emit('chat message', { text: finalText, chatId: currentChatId === null ? null : Number(currentChatId) });
            document.getElementById('messageInput').value = '';
        }
        
        document.getElementById('chatForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const msg = document.getElementById('messageInput').value.trim();
            if (msg) sendMessage(msg);
        });
        
        const imageButton = document.getElementById('imageButton');
        const imageInput = document.getElementById('imageInput');
        imageButton.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', async () => {
            const file = imageInput.files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append('image', file);
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: fd });
                const data = await res.json();
                if (data.success) sendMessage(null, data.url);
                else alert('Ошибка загрузки');
            } catch(e) { alert('Ошибка'); }
            imageInput.value = '';
        });
        
        async function showNewChatModal() {
            await loadUsersList();
            document.getElementById('userModal').style.display = 'flex';
        }
        
        async function loadUsersList() {
            try {
                const res = await fetch('/api/users');
                const data = await res.json();
                if (data.success && data.users) {
                    allUsers = data.users.filter(u => u.id !== currentUserId);
                    const container = document.getElementById('usersListModal');
                    if (!allUsers.length) { container.innerHTML = '<div>Нет других пользователей</div>'; return; }
                    let html = '';
                    for (let u of allUsers) html += `<div class="user-item" onclick="startChatWithUser(${u.id}, '${escapeHtml(u.name)}')"><strong>${escapeHtml(u.name)}</strong><br><small>${escapeHtml(u.email)}</small></div>`;
                    container.innerHTML = html;
                }
            } catch(e) { console.error(e); }
        }
        
        async function startChatWithUser(otherId, otherName) {
            try {
                const res = await fetch('/api/get-or-create-chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUserId, otherUserId: otherId }) });
                const data = await res.json();
                if (data.success) {
                    closeModal();
                    await loadChats();
                    selectChat(data.chatId, otherName);
                } else alert('Ошибка');
            } catch(e) { alert('Ошибка'); }
        }
        
        function closeModal() {
            document.getElementById('userModal').style.display = 'none';
            document.getElementById('userSearch').value = '';
        }
        
        document.getElementById('userSearch').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = allUsers.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q));
            const container = document.getElementById('usersListModal');
            if (!filtered.length) { container.innerHTML = '<div>Ничего не найдено</div>'; return; }
            let html = '';
            for (let u of filtered) html += `<div class="user-item" onclick="startChatWithUser(${u.id}, '${escapeHtml(u.name)}')"><strong>${escapeHtml(u.name)}</strong><br><small>${escapeHtml(u.email)}</small></div>`;
            container.innerHTML = html;
        });
        
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.message') && selectedMessageElement) {
                selectedMessageElement.classList.remove('selected');
                selectedMessageElement = null;
            }
        });
        
        loadChats();
    </script>
</body>
</html>
