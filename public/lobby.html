<!DOCTYPE html>
<html lang="ru">
<head>
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pioneria Project — Лобби</title>
    <link rel="icon" type="image/jpg" href="/favicon.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root, [data-theme="light"] {
            --bg-body: linear-gradient(160deg, #e8ecf5 0%, #f0f2fa 40%, #eef0f8 100%);
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fb;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --accent: #667eea;
            --accent-light: #eef0ff;
            --accent-hover: #5a6fd6;
            --border-color: #eef0f5;
            --card-bg: #ffffff;
            --card-shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
            --card-shadow-hover: 0 2px 6px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.06);
            --header-bg: rgba(255,255,255,0.85);
            --header-shadow: 0 1px 0 rgba(0,0,0,0.04);
            --sidebar-bg: #ffffff;
            --overlay-bg: rgba(0,0,0,0.3);
            --news-bullet: #667eea;
            --button-text: #ffffff;
            --avatar-gradient: linear-gradient(135deg, #667eea, #8b5cf6);
            --decor-circle-1: rgba(102,126,234,0.06);
            --decor-circle-2: rgba(139,92,246,0.05);
            --decor-circle-3: rgba(102,126,234,0.04);
        }

        [data-theme="dark"] {
            --bg-body: linear-gradient(160deg, #13132b 0%, #1a1a35 40%, #151530 100%);
            --bg-primary: #1e1e32;
            --bg-secondary: #252540;
            --text-primary: #e4e6eb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent: #7c8aff;
            --accent-light: #1e2040;
            --accent-hover: #6a78e8;
            --border-color: #2a2a40;
            --card-bg: #252540;
            --card-shadow: 0 1px 3px rgba(0,0,0,0.15), 0 4px 16px rgba(0,0,0,0.2);
            --card-shadow-hover: 0 2px 6px rgba(0,0,0,0.2), 0 8px 24px rgba(0,0,0,0.25);
            --header-bg: rgba(30,30,50,0.85);
            --header-shadow: 0 1px 0 rgba(255,255,255,0.04);
            --sidebar-bg: #1e1e32;
            --overlay-bg: rgba(0,0,0,0.6);
            --news-bullet: #7c8aff;
            --button-text: #ffffff;
            --avatar-gradient: linear-gradient(135deg, #7c8aff, #9b8aff);
            --decor-circle-1: rgba(124,138,255,0.08);
            --decor-circle-2: rgba(155,138,255,0.06);
            --decor-circle-3: rgba(124,138,255,0.04);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            color: var(--text-primary);
            transition: background 0.4s, color 0.3s;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--header-shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .menu-btn {
            background: none; border: none;
            font-size: 22px; cursor: pointer;
            color: var(--text-primary);
            padding: 8px 10px; border-radius: 12px;
            transition: all 0.2s; line-height: 1;
        }
        .menu-btn:hover { background: var(--bg-secondary); }
        .menu-btn:active { transform: scale(0.94); background: var(--accent-light); }

        .logo {
            font-size: 17px; font-weight: 700;
            color: var(--text-primary); letter-spacing: -0.3px;
        }
        .logo span { color: var(--accent); }

        .avatar {
            width: 38px; height: 38px;
            background: var(--avatar-gradient);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 600; font-size: 16px;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(102,126,234,0.3);
            flex-shrink: 0; overflow: hidden;
        }
        .avatar:hover { transform: scale(1.05); box-shadow: 0 4px 14px rgba(102,126,234,0.4); }
        .avatar:active { transform: scale(0.95); }
        .avatar img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }

        /* Боковое меню */
        .sidebar {
            position: fixed; top: 0; left: -290px;
            width: 280px; height: 100%;
            background: var(--sidebar-bg);
            box-shadow: 4px 0 30px rgba(0,0,0,0.08);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200; padding: 16px 0;
            display: flex; flex-direction: column;
        }
        .sidebar.open { left: 0; }

        .sidebar-top {
            padding: 8px 16px 16px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 8px;
        }
        .sidebar-user {
            display: flex; align-items: center; gap: 12px;
            padding: 8px; border-radius: 14px;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: background 0.15s;
        }
        .sidebar-user:hover { background: var(--accent-light); }
        .sidebar-user-avatar {
            width: 44px; height: 44px;
            background: var(--avatar-gradient);
            border-radius: 50%; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 18px;
            flex-shrink: 0;
        }
        .sidebar-user-avatar img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .sidebar-user-info { min-width: 0; }
        .sidebar-user-name { font-weight: 600; font-size: 14px; color: var(--text-primary); }
        .sidebar-user-role { font-size: 11px; color: var(--text-muted); }

        .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 12px; display: flex; flex-direction: column; }

        .sidebar-label {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--text-muted);
            padding: 14px 12px 6px;
        }

        .sidebar-item {
            padding: 12px 14px; margin: 2px 0;
            display: flex; align-items: center; gap: 12px;
            cursor: pointer; border-radius: 12px;
            transition: all 0.15s;
            color: var(--text-primary); font-size: 14px;
            font-weight: 500; text-decoration: none;
        }
        .sidebar-item:hover { background: var(--bg-secondary); }
        .sidebar-item:active { transform: scale(0.97); background: var(--accent-light); }
        .sidebar-item .icon {
            width: 36px; height: 36px;
            background: var(--bg-secondary);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
            transition: background 0.2s;
        }
        .sidebar-item:hover .icon { background: var(--accent-light); }
        .sidebar-item.logout { color: #ef4444; }
        .sidebar-item.logout .icon { background: #fef2f2; }
        [data-theme="dark"] .sidebar-item.logout .icon { background: #3b1a1a; }

        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--overlay-bg);
            display: none; z-index: 150;
            backdrop-filter: blur(2px);
        }
        .overlay.active { display: block; }

        /* Контент */
        .content {
            max-width: 700px; margin: 0 auto;
            padding: 24px 20px 40px;
        }

        /* Приветственная карточка */
        .welcome-card {
            background: var(--card-bg);
            border-radius: 22px; padding: 32px 28px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s;
            position: relative; overflow: hidden;
        }
        .welcome-card .decor {
            position: absolute; border-radius: 50%; pointer-events: none;
        }
        .welcome-card .decor-1 {
            top: -50px; right: -30px;
            width: 140px; height: 140px;
            background: var(--decor-circle-1);
        }
        .welcome-card .decor-2 {
            bottom: -60px; left: -20px;
            width: 120px; height: 120px;
            background: var(--decor-circle-2);
        }
        .welcome-card .decor-3 {
            top: 40%; right: 10%;
            width: 70px; height: 70px;
            background: var(--decor-circle-3);
        }
        .welcome-card .decor-4 {
            bottom: 10%; right: 25%;
            width: 50px; height: 50px;
            background: var(--decor-circle-2);
        }
        .welcome-card .decor-5 {
            top: 15%; left: 40%;
            width: 35px; height: 35px;
            background: var(--decor-circle-3);
        }
        .welcome-card h1 {
            font-size: 22px; font-weight: 700;
            color: var(--text-primary); margin-bottom: 4px;
            position: relative;
        }
        .welcome-card .subtitle {
            color: var(--text-secondary); font-size: 14px;
            position: relative;
        }

        /* Карточки быстрого доступа */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px; margin-bottom: 24px;
        }
        .quick-action {
            background: var(--card-bg);
            border-radius: 18px; padding: 24px 14px;
            text-align: center; cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: all 0.25s;
            display: flex; flex-direction: column;
            align-items: center; gap: 12px;
        }
        .quick-action:hover {
            transform: translateY(-3px);
            box-shadow: var(--card-shadow-hover);
        }
        .quick-action:active { transform: scale(0.96); }
        .quick-action .action-icon {
            width: 56px; height: 56px;
            background: var(--accent-light);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
        }
        .quick-action .action-label {
            font-size: 14px; font-weight: 600;
            color: var(--text-primary);
        }

        /* Новости */
        .news-card {
            background: var(--card-bg);
            border-radius: 20px; padding: 24px;
            box-shadow: var(--card-shadow);
            transition: background 0.3s;
        }
        .news-card h2 {
            font-size: 17px; font-weight: 700;
            color: var(--text-primary); margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .news-list { list-style: none; }
        .news-list li {
            padding: 14px 0; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: flex-start; gap: 12px;
            font-size: 14px;
        }
        .news-list li:last-child { border-bottom: none; }
        .news-bullet {
            width: 8px; height: 8px;
            background: var(--news-bullet);
            border-radius: 50%; flex-shrink: 0;
            margin-top: 6px;
        }
        .news-content { flex: 1; min-width: 0; }
        .news-content strong { color: var(--text-primary); display: block; margin-bottom: 2px; }
        .news-content div { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
        .news-date {
            color: var(--text-muted); font-size: 11px;
            flex-shrink: 0; margin-top: 2px;
        }
        .news-empty {
            text-align: center; color: var(--text-muted);
            padding: 20px; font-size: 14px;
        }

        @media (max-width: 768px) {
            .quick-actions { gap: 10px; }
            .quick-action { padding: 18px 10px; }
            .quick-action .action-icon { width: 48px; height: 48px; font-size: 24px; border-radius: 14px; }
            .quick-action .action-label { font-size: 13px; }
            .welcome-card { padding: 24px 20px; }
            .welcome-card h1 { font-size: 20px; }
            .content { padding: 16px 12px 32px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div class="logo"><span>🎵</span> PIONERIA</div>
        <div class="avatar" id="avatarBtn" onclick="goToProfile()"></div>
    </div>

    <!-- Боковое меню -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="sidebar-user" onclick="goToProfile(); closeMenu();">
                <div class="sidebar-user-avatar" id="sidebarAvatar"></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="sidebarName"></div>
                    <div class="sidebar-user-role" id="sidebarRole"></div>
                </div>
            </div>
        </div>
        <div class="sidebar-nav">
            <div class="sidebar-label">Основное</div>
            <div class="sidebar-item" onclick="goToMessenger()">
                <div class="icon">💬</div><span>Чат</span>
            </div>
            <div class="sidebar-item" onclick="goToSchedule()">
                <div class="icon">📅</div><span>Расписание</span>
            </div>
            
            <div class="sidebar-label">Инструменты</div>
            <div class="sidebar-item" onclick="goToPage('solfege.html')">
                <div class="icon">🎼</div><span>Сольфеджио</span>
            </div>
            <div class="sidebar-item" onclick="goToPage('storage.html')">
                <div class="icon">📦</div><span>Хранилище</span>
            </div>
            <div class="sidebar-item" onclick="goToPage('navigator.html')">
                <div class="icon">🗺️</div><span>Навигатор</span>
            </div>
            
            <div style="flex:1;"></div>
            
            <div class="sidebar-item" id="adminMenuItem" style="display:none;" onclick="goToAdmin()">
                <div class="icon">🔧</div><span>Админ-панель</span>
            </div>
            <div class="sidebar-item" onclick="goToProfile()">
                <div class="icon">👤</div><span>Профиль</span>
            </div>
            <div class="sidebar-item logout" onclick="logout()">
                <div class="icon">🚪</div><span>Выйти</span>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeMenu()"></div>

    <!-- Контент -->
    <div class="content">
        <div class="welcome-card">
            <div class="decor decor-1"></div>
            <div class="decor decor-2"></div>
            <div class="decor decor-3"></div>
            <div class="decor decor-4"></div>
            <div class="decor decor-5"></div>
            <h1>Привет, <span id="userName"></span>!</h1>
            <div class="subtitle">Добро пожаловать в Pioneria Project</div>
        </div>

        <!-- Быстрые действия — только 3 -->
        <div class="quick-actions">
            <div class="quick-action" onclick="goToMessenger()">
                <div class="action-icon">💬</div>
                <div class="action-label">Чат</div>
            </div>
            <div class="quick-action" onclick="goToSchedule()">
                <div class="action-icon">📅</div>
                <div class="action-label">Расписание</div>
            </div>
            <div class="quick-action" onclick="goToProfile()">
                <div class="action-icon">👤</div>
                <div class="action-label">Профиль</div>
            </div>
        </div>

        <!-- Новости -->
        <div class="news-card">
            <h2>📢 Новости</h2>
            <ul class="news-list" id="newsList">
                <div class="news-empty">Загрузка...</div>
            </ul>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('user') || '{}');
        if (!userData.name) window.location.href = 'login.html';

        // ====== ТЕМА ======
        function getCurrentTheme() {
            return localStorage.getItem('theme') || 'light';
        }
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.content = theme === 'light' ? '#667eea' : '#1a1a2e';
        }
        async function loadTheme() {
            try {
                const res = await fetch(`/api/user/settings?userId=${userData.id}&key=theme`);
                const data = await res.json();
                if (data.success && data.value) {
                    applyTheme(data.value);
                    localStorage.setItem('theme', data.value);
                } else {
                    applyTheme(getCurrentTheme());
                }
            } catch(e) {
                applyTheme(getCurrentTheme());
            }
        }
        loadTheme();

        // ====== ИНИЦИАЛИЗАЦИЯ ======
        function getUserInitial() {
            return (userData.name || '?')[0].toUpperCase();
        }

        function updateAvatars() {
            const initial = getUserInitial();
            const avatarUrl = userData.avatar;
            
            const headerAvatar = document.getElementById('avatarBtn');
            if (avatarUrl) {
                headerAvatar.innerHTML = `<img src="${avatarUrl}" alt="">`;
            } else {
                headerAvatar.textContent = initial;
            }
            
            const sidebarAvatar = document.getElementById('sidebarAvatar');
            if (avatarUrl) {
                sidebarAvatar.innerHTML = `<img src="${avatarUrl}" alt="">`;
            } else {
                sidebarAvatar.textContent = initial;
            }
        }

        function init() {
            document.getElementById('userName').textContent = userData.name;
            document.getElementById('sidebarName').textContent = userData.name;
            document.getElementById('sidebarRole').textContent = userData.role === 'admin' ? 'Администратор' : 'Участник';
            updateAvatars();
            
            if (userData.role === 'admin') {
                document.getElementById('adminMenuItem').style.display = 'flex';
            }
            
            loadNews();
        }

        // ====== МЕНЮ ======
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
        function closeMenu() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }

        // ====== НАВИГАЦИЯ ======
        function goToMessenger() { window.location.href = 'messenger.html'; closeMenu(); }
        function goToSchedule() { window.location.href = 'schedule.html'; closeMenu(); }
        function goToProfile() { window.location.href = 'profile.html'; closeMenu(); }
        function goToAdmin() { window.location.href = 'admin.html'; closeMenu(); }
        function goToPage(page) { window.location.href = page; closeMenu(); }
        function logout() {
            if (confirm('Выйти из аккаунта?')) {
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            }
        }

        // ====== НОВОСТИ ======
        async function loadNews() {
            try {
                const res = await fetch('/api/news');
                const data = await res.json();
                const list = document.getElementById('newsList');
                
                if (data.success && data.news.length > 0) {
                    list.innerHTML = data.news.map(news => {
                        const date = new Date(news.created_at).toLocaleDateString('ru-RU', {
                            day: 'numeric', month: 'short'
                        });
                        return `<li>
                            <div class="news-bullet"></div>
                            <div class="news-content">
                                <strong>${esc(news.title)}</strong>
                                <div>${esc(news.content)}</div>
                            </div>
                            <span class="news-date">${date}</span>
                        </li>`;
                    }).join('');
                } else {
                    list.innerHTML = '<div class="news-empty">Новостей пока нет ✨</div>';
                }
            } catch(e) {
                document.getElementById('newsList').innerHTML = '<div class="news-empty">Ошибка загрузки</div>';
            }
        }

        function esc(text) {
            const d = document.createElement('div');
            d.textContent = text || '';
            return d.innerHTML;
        }

        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const menuBtn = document.querySelector('.menu-btn');
            if (!sidebar.contains(e.target) && !menuBtn.contains(e.target) && sidebar.classList.contains('open')) {
                closeMenu();
            }
        });

        init();
    </script>
</body>
</html>
