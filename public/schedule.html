<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание — Pioneria</title>
    <link rel="icon" type="image/jpg" href="/favicon.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root, [data-theme="light"] {
            --bg-body: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-card: #ffffff;
            --bg-cell: #f5f5f5;
            --bg-cell-active: #667eea;
            --bg-cell-cancelled: #ff4444;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-white: #ffffff;
            --border-color: #e0e0e0;
            --accent: #667eea;
            --modal-overlay: rgba(0,0,0,0.5);
        }

        [data-theme="dark"] {
            --bg-body: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --bg-card: #2a2a3e;
            --bg-cell: #3a3a4e;
            --bg-cell-active: #7c8aff;
            --bg-cell-cancelled: #cc3333;
            --text-primary: #e4e6eb;
            --text-secondary: #b0b3b8;
            --text-white: #ffffff;
            --border-color: #3e4042;
            --accent: #7c8aff;
            --modal-overlay: rgba(0,0,0,0.7);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            padding: 15px;
            color: var(--text-primary);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .back-btn {
            background: var(--bg-card);
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 10px 14px;
            border-radius: 10px;
            color: var(--accent);
        }

        .header h2 {
            flex: 1;
        }

        .group-select {
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .schedule-table {
            width: 100%;
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .schedule-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .schedule-table th {
            padding: 14px 8px;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border-color);
            font-weight: 600;
        }

        .schedule-table th.today {
            color: var(--accent);
            font-weight: 800;
        }

        .schedule-table td {
            padding: 16px 10px;
            text-align: center;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }

        .schedule-table tr:last-child td {
            border-bottom: none;
        }

        .lesson-cell {
            background: var(--bg-cell-active);
            color: var(--text-white);
            border-radius: 8px;
            padding: 8px 10px;
            font-weight: 600;
            font-size: 12px;
            display: inline-block;
            animation: popIn 0.2s ease;
        }

        .lesson-cell.cancelled {
            background: var(--bg-cell-cancelled);
            text-decoration: line-through;
            opacity: 0.8;
        }

        .lesson-cell.common {
            background: #f59e0b;
        }

        .empty-cell {
            color: var(--text-secondary);
            font-size: 20px;
        }

        .day-label {
            font-weight: 600;
        }

        /* Модалка первого выбора */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--modal-overlay);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px 25px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .modal-content button {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 10px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: var(--bg-cell);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .modal-content button:hover {
            background: var(--accent);
            color: white;
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 480px) {
            .schedule-table th, .schedule-table td {
                padding: 10px 4px;
                font-size: 11px;
            }
            .lesson-cell {
                font-size: 10px;
                padding: 6px 8px;
            }
        }
    </style>
</head>
<body>
    <script>
        (function() {
            document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
        })();
    </script>

    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h2>📅 Расписание</h2>
        <select class="group-select" id="groupSelect" onchange="changeGroup(this.value)">
            <option value="">Загрузка...</option>
        </select>
    </div>

    <div class="container">
        <div class="schedule-table" id="scheduleTable">
            Загрузка...
        </div>
    </div>

    <!-- Модалка первого выбора -->
    <div class="modal" id="groupModal" style="display: none;">
        <div class="modal-content">
            <h3>🎵 Выбери свою группу</h3>
            <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 14px;">
                Это нужно, чтобы показывать твоё расписание
            </p>
            <div id="groupButtons"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'schedule_group';
        let groups = [];
        let selectedGroupId = null;
        let allLessons = [];
        let today = new Date().getDay() || 7;

        const dayNames = ['', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];

        function goBack() { window.location.href = 'lobby.html'; }

        async function init() {
            await loadGroups();
            
            // Проверяем, выбран ли уже группа
            const savedGroupId = localStorage.getItem(STORAGE_KEY);
            
            if (!savedGroupId || !groups.find(g => g.id == savedGroupId)) {
                // Первый вход — показываем модалку
                showGroupModal();
            } else {
                selectedGroupId = parseInt(savedGroupId);
                document.getElementById('groupSelect').value = selectedGroupId;
                loadSchedule();
            }
        }

        async function loadGroups() {
            try {
                const res = await fetch('/api/schedule/groups');
                const data = await res.json();
                if (data.success) {
                    groups = data.groups;
                    renderGroupSelect();
                }
            } catch(e) { console.error(e); }
        }

        function renderGroupSelect() {
            const select = document.getElementById('groupSelect');
            select.innerHTML = groups.map(g => 
                `<option value="${g.id}">${g.name}</option>`
            ).join('');
        }

        function showGroupModal() {
            const modal = document.getElementById('groupModal');
            const buttons = document.getElementById('groupButtons');
            
            buttons.innerHTML = groups.map(g => `
                <button onclick="selectGroup(${g.id})">
                    ${g.name}
                </button>
            `).join('');
            
            modal.style.display = 'flex';
        }

        function selectGroup(id) {
            selectedGroupId = id;
            localStorage.setItem(STORAGE_KEY, id);
            document.getElementById('groupSelect').value = id;
            document.getElementById('groupModal').style.display = 'none';
            loadSchedule();
        }

        function changeGroup(id) {
            selectedGroupId = parseInt(id);
            localStorage.setItem(STORAGE_KEY, id);
            loadSchedule();
        }

        async function loadSchedule() {
            if (!selectedGroupId) return;
            
            try {
                const res = await fetch(`/api/schedule?groupId=${selectedGroupId}`);
                const data = await res.json();
                if (data.success) {
                    allLessons = data.lessons;
                    renderTable();
                }
            } catch(e) { console.error(e); }
        }

        function renderTable() {
            const container = document.getElementById('scheduleTable');
            
            let html = '<table>';
            
            // Заголовок — дни недели
            html += '<tr><th></th>';
            for (let d = 1; d <= 6; d++) {
                const isToday = d === today;
                html += `<th class="${isToday ? 'today' : ''}">${dayNames[d]}</th>`;
            }
            html += '</tr>';
            
            // Одна строка с репетициями
            html += '<tr><td class="day-label">Репетиция</td>';
            for (let d = 1; d <= 6; d++) {
                const lesson = allLessons.find(l => l.day_of_week === d);
                
                if (lesson) {
                    let cellClass = 'lesson-cell';
                    if (lesson.status === 'cancelled') cellClass += ' cancelled';
                    if (lesson.is_common) cellClass += ' common';
                    
                    const timeStr = lesson.end_time 
                        ? `${lesson.start_time.substring(0,5)}–${lesson.end_time.substring(0,5)}`
                        : lesson.start_time.substring(0,5);
                    
                    const label = lesson.status === 'cancelled' 
                        ? `${timeStr} (отменена)` 
                        : timeStr;
                    
                    html += `<td><span class="${cellClass}">${label}</span></td>`;
                } else {
                    html += '<td><span class="empty-cell">·</span></td>';
                }
            }
            html += '</tr>';
            
            html += '</table>';
            
            // Подсказка
            html += '<div style="padding: 12px; text-align: center; font-size: 12px; color: var(--text-secondary);">';
            html += '🟣 Репетиция &nbsp;&nbsp; 🔴 Отменена &nbsp;&nbsp; 🟠 Общая';
            html += '</div>';
            
            container.innerHTML = html;
        }

        init();
    </script>
</body>
</html>
