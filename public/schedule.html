<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Расписание — Pioneria</title>
    <link rel="icon" type="image/jpg" href="/favicon.jpg">
    <meta name="theme-color" content="#667eea">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root, [data-theme="light"] {
            --bg-body: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-card: #ffffff;
            --bg-lesson: #f0f4ff;
            --bg-concert: #e8f8e8;
            --bg-today: #f0f4ff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --accent: #667eea;
            --border-color: #e8e8e8;
            --danger: #ff4757;
            --danger-bg: #fff0f0;
            --warning: #f59e0b;
            --warning-bg: #fff8e8;
            --concert: #22c55e;
            --concert-bg: #e8fce8;
            --modal-overlay: rgba(0,0,0,0.5);
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        [data-theme="dark"] {
            --bg-body: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --bg-card: #2a2a3e;
            --bg-lesson: #2a3050;
            --bg-concert: #1a3a20;
            --bg-today: #2a3550;
            --text-primary: #e4e6eb;
            --text-secondary: #b0b3b8;
            --text-muted: #8a8d91;
            --accent: #7c8aff;
            --border-color: #3e4042;
            --danger: #ff6b6b;
            --danger-bg: #3a2020;
            --warning: #f0a030;
            --warning-bg: #3a3020;
            --concert: #4ade80;
            --concert-bg: #1a3020;
            --modal-overlay: rgba(0,0,0,0.7);
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            padding: 12px;
            color: var(--text-primary);
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            flex-wrap: wrap;
        }

        .back-btn {
            background: var(--bg-card);
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 10px 14px;
            border-radius: 12px;
            color: var(--accent);
            box-shadow: var(--shadow);
        }

        .header h2 { flex: 1; font-size: 1.1rem; min-width: 100px; }

        .group-select {
            padding: 10px 12px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 600;
            box-shadow: var(--shadow);
            -webkit-appearance: none;
        }

        .container { max-width: 600px; margin: 0 auto; }

        /* Навигация по неделям */
        .week-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .week-nav button {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            color: var(--accent);
            box-shadow: var(--shadow);
            font-weight: 700;
        }

        .week-nav .week-label {
            font-weight: 700;
            font-size: 13px;
            color: var(--text-primary);
            text-align: center;
            min-width: 150px;
        }

        .week-nav .this-week-btn {
            font-size: 11px;
            padding: 6px 10px;
            color: var(--text-secondary);
        }

        /* Карточки дней */
        .week-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .day-card {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 14px;
            box-shadow: var(--shadow);
            border-left: 4px solid transparent;
        }

        .day-card.today {
            background: var(--bg-today);
            border-left-color: var(--accent);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .day-name {
            font-weight: 700;
            font-size: 14px;
        }

        .day-card.today .day-name { color: var(--accent); }

        .day-date {
            font-size: 12px;
            color: var(--text-muted);
        }

        .today-badge {
            background: var(--accent);
            color: #fff;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 700;
        }

        .lessons-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .lesson-card {
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .lesson-card.rehearsal { background: var(--bg-lesson); }
        .lesson-card.concert { background: var(--bg-concert); }
        .lesson-card.cancelled { background: var(--danger-bg); opacity: 0.7; }
        .lesson-card.common { background: var(--warning-bg); }

        .lesson-time {
            font-weight: 700;
            font-size: 12px;
            white-space: nowrap;
            min-width: 50px;
        }

        .lesson-card.rehearsal .lesson-time { color: var(--accent); }
        .lesson-card.concert .lesson-time { color: var(--concert); }
        .lesson-card.cancelled .lesson-time { color: var(--danger); text-decoration: line-through; }
        .lesson-card.common .lesson-time { color: var(--warning); }

        .lesson-info { flex: 1; }
        .lesson-title { font-weight: 600; font-size: 13px; }

        .lesson-badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
        }

        .lesson-badge.rehearsal { background: var(--accent); }
        .lesson-badge.concert { background: var(--concert); }
        .lesson-badge.cancelled { background: var(--danger); }
        .lesson-badge.common { background: var(--warning); }

        .empty-day {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            padding: 6px 0;
        }

        .legend {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 12px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .legend span { display: flex; align-items: center; gap: 5px; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .legend-dot.rehearsal { background: var(--accent); }
        .legend-dot.concert { background: var(--concert); }
        .legend-dot.cancelled { background: var(--danger); }
        .legend-dot.common { background: var(--warning); }

        /* Модалка */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--modal-overlay);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 28px 22px;
            width: 90%;
            max-width: 340px;
            text-align: center;
        }

        .modal-content h3 { margin-bottom: 8px; font-size: 1.2rem; }
        .modal-content .subtitle { color: var(--text-secondary); margin-bottom: 20px; font-size: 13px; }
        .modal-content button {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 8px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: var(--bg-card);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .modal-content button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

        @media (max-width: 400px) {
            body { padding: 6px; }
            .header { gap: 6px; }
            .day-card { padding: 10px; }
            .lesson-card { padding: 8px 10px; gap: 6px; font-size: 11px; }
            .lesson-time { font-size: 10px; min-width: 42px; }
            .lesson-title { font-size: 11px; }
        }
    </style>
</head>
<body>
    <script>
        (function() {
            document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
        })();
    </script>

    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h2>📅 Расписание</h2>
        <select class="group-select" id="groupSelect" onchange="changeGroup(this.value)">
            <option value="">Загрузка...</option>
        </select>
    </div>

    <div class="container">
        <!-- Навигация по неделям -->
        <div class="week-nav">
            <button onclick="prevWeek()">←</button>
            <span class="week-label" id="weekLabel">Текущая неделя</span>
            <button onclick="nextWeek()">→</button>
            <button class="this-week-btn" onclick="goToThisWeek()">Сегодня</button>
        </div>

        <div class="week-grid" id="scheduleContent">
            Загрузка...
        </div>

        <div class="legend">
            <span><span class="legend-dot rehearsal"></span> Репетиция</span>
            <span><span class="legend-dot concert"></span> Концерт</span>
            <span><span class="legend-dot cancelled"></span> Отменена</span>
            <span><span class="legend-dot common"></span> Общая</span>
        </div>
    </div>

    <div class="modal" id="groupModal" style="display:none;">
        <div class="modal-content">
            <h3>🎵 Выбери свою группу</h3>
            <p class="subtitle">Это нужно, чтобы показывать твоё расписание</p>
            <div id="groupButtons"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'schedule_group';
        let groups = [];
        let selectedGroupId = null;
        let allLessons = [];
        let weekOffset = 0; // 0 = текущая неделя, -1 = прошлая, 1 = следующая

        const dayNames = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
        const fullDayNames = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];

        function goBack() { window.location.href = 'lobby.html'; }

        function getMondayOfWeek(offset) {
            const now = new Date();
            const day = now.getDay(); // 0=Вс
            const mondayOffset = day === 0 ? -6 : 1 - day;
            const monday = new Date(now);
            monday.setDate(now.getDate() + mondayOffset + (offset * 7));
            monday.setHours(0, 0, 0, 0);
            return monday;
        }

        function getWeekDates(offset) {
            const monday = getMondayOfWeek(offset);
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                dates.push(d);
            }
            return dates;
        }

        function formatDate(date) {
            return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
        }

        function formatWeekLabel(dates) {
            const first = dates[0];
            const last = dates[6];
            const opts = { day: 'numeric', month: 'long' };
            return `${first.toLocaleDateString('ru-RU', opts)} — ${last.toLocaleDateString('ru-RU', opts)}`;
        }

        function isToday(date) {
            const today = new Date();
            return date.getDate() === today.getDate() &&
                   date.getMonth() === today.getMonth() &&
                   date.getFullYear() === today.getFullYear();
        }

        function prevWeek() { weekOffset--; loadSchedule(); }
        function nextWeek() { weekOffset++; loadSchedule(); }
        function goToThisWeek() { weekOffset = 0; loadSchedule(); }

        async function init() {
            await loadGroups();
            const savedGroupId = localStorage.getItem(STORAGE_KEY);
            if (!savedGroupId || !groups.find(g => g.id == savedGroupId)) {
                showGroupModal();
            } else {
                selectedGroupId = parseInt(savedGroupId);
                document.getElementById('groupSelect').value = selectedGroupId;
                loadSchedule();
            }
        }

        async function loadGroups() {
            try {
                const res = await fetch('/api/schedule/groups');
                const data = await res.json();
                if (data.success) {
                    groups = data.groups;
                    renderGroupSelect();
                }
            } catch(e) { console.error(e); }
        }

        function renderGroupSelect() {
            const select = document.getElementById('groupSelect');
            select.innerHTML = groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
        }

        function showGroupModal() {
            document.getElementById('groupButtons').innerHTML = groups.map(g =>
                `<button onclick="selectGroup(${g.id})">${g.name}</button>`
            ).join('');
            document.getElementById('groupModal').style.display = 'flex';
        }

        function selectGroup(id) {
            selectedGroupId = id;
            localStorage.setItem(STORAGE_KEY, id);
            document.getElementById('groupSelect').value = id;
            document.getElementById('groupModal').style.display = 'none';
            loadSchedule();
        }

        function changeGroup(id) {
            selectedGroupId = parseInt(id);
            localStorage.setItem(STORAGE_KEY, id);
            loadSchedule();
        }

        async function loadSchedule() {
            if (!selectedGroupId) return;
            try {
                const res = await fetch(`/api/schedule?groupId=${selectedGroupId}`);
                const data = await res.json();
                if (data.success) {
                    allLessons = data.lessons;
                    renderSchedule();
                }
            } catch(e) { console.error(e); }
        }

        function renderSchedule() {
            const container = document.getElementById('scheduleContent');
            const weekDates = getWeekDates(weekOffset);
            
            document.getElementById('weekLabel').textContent = formatWeekLabel(weekDates);
            
            let html = '';
            
            weekDates.forEach((date, index) => {
                const dayOfWeek = date.getDay(); // 0=Вс ... 6=Сб
                
                // ВСЕ уроки в этот день
                const dayLessons = allLessons.filter(l => l.day_of_week === dayOfWeek);
                
                const todayClass = isToday(date) ? 'today' : '';
                
                html += `<div class="day-card ${todayClass}">`;
                html += '<div class="day-header">';
                html += `<span class="day-name">${fullDayNames[dayOfWeek]}</span>`;
                html += `<span class="day-date">${formatDate(date)}</span>`;
                if (isToday(date)) html += '<span class="today-badge">Сегодня</span>';
                html += '</div>';
                html += '<div class="lessons-list">';
                
                if (dayLessons.length === 0) {
                    html += '<div class="empty-day">Нет событий</div>';
                } else {
                    dayLessons.forEach(lesson => {
                        const eventType = lesson.event_type || 'rehearsal';
                        let cardClass = `lesson-card ${eventType}`;
                        if (lesson.status === 'cancelled') cardClass += ' cancelled';
                        if (lesson.is_common && eventType === 'rehearsal') cardClass += ' common';
                        
                        let badgeText = eventType === 'concert' ? 'Концерт' : (lesson.is_common ? 'Общая' : (lesson.group_name || ''));
                        if (lesson.status === 'cancelled') badgeText = 'Отменена';
                        
                        let badgeClass = `lesson-badge ${lesson.status === 'cancelled' ? 'cancelled' : (eventType === 'concert' ? 'concert' : (lesson.is_common ? 'common' : 'rehearsal'))}`;
                        
                        const timeStr = lesson.end_time 
                            ? `${lesson.start_time.substring(0,5)}–${lesson.end_time.substring(0,5)}`
                            : lesson.start_time.substring(0,5);
                        
                        html += `
                            <div class="${cardClass}">
                                <div class="lesson-time">${timeStr}</div>
                                <div class="lesson-info">
                                    <div class="lesson-title">${lesson.title || (eventType === 'concert' ? 'Концерт' : 'Репетиция')}</div>
                                    ${lesson.description ? `<div style="font-size:11px;color:var(--text-secondary);">${lesson.description}</div>` : ''}
                                </div>
                                <span class="${badgeClass}">${badgeText}</span>
                            </div>
                        `;
                    });
                }
                
                html += '</div></div>';
            });
            
            container.innerHTML = html;
        }

        init();
    </script>
</body>
</html>
