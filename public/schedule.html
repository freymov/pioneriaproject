<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Расписание — Pioneria</title>
    <link rel="icon" type="image/jpg" href="/favicon.jpg">
    <meta name="theme-color" content="#667eea">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root, [data-theme="light"] {
            --bg-body: linear-gradient(160deg, #e8ecf5 0%, #f0f2fa 40%, #eef0f8 100%);
            --bg-card: #ffffff;
            --bg-secondary: #f8f9fb;
            --bg-today: #f5f3ff;
            --bg-rehearsal: #eef1ff;
            --bg-common: #fff8eb;
            --bg-concert: #e8faf0;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --accent: #667eea;
            --accent-light: #eef0ff;
            --border-color: #eef0f5;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --warning: #f59e0b;
            --concert: #22c55e;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
            --header-bg: rgba(255,255,255,0.85);
            --header-shadow: 0 1px 0 rgba(0,0,0,0.04);
        }

        [data-theme="dark"] {
            --bg-body: linear-gradient(160deg, #13132b 0%, #1a1a35 40%, #151530 100%);
            --bg-card: #252540;
            --bg-secondary: #1e1e32;
            --bg-today: #2a2a48;
            --bg-rehearsal: #252a48;
            --bg-common: #2a2518;
            --bg-concert: #1a3025;
            --text-primary: #e4e6eb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent: #7c8aff;
            --accent-light: #1e2040;
            --border-color: #2a2a40;
            --danger: #ff6b6b;
            --danger-bg: #3a2020;
            --warning: #f0a030;
            --concert: #4ade80;
            --shadow: 0 1px 3px rgba(0,0,0,0.15), 0 4px 16px rgba(0,0,0,0.2);
            --header-bg: rgba(30,30,50,0.85);
            --header-shadow: 0 1px 0 rgba(255,255,255,0.04);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            color: var(--text-primary);
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: var(--header-shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none; border: none;
            font-size: 20px; cursor: pointer;
            color: var(--accent); padding: 6px 10px;
            border-radius: 10px;
        }
        .back-btn:active { background: var(--accent-light); }

        .header h2 { font-size: 17px; font-weight: 700; flex: 1; }

        .group-select {
            padding: 8px 12px; border-radius: 10px;
            border: 2px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px; font-weight: 600;
            -webkit-appearance: none; cursor: pointer;
        }

        .container { max-width: 650px; margin: 0 auto; padding: 16px 16px 32px; }

        .week-nav {
            display: flex; align-items: center;
            justify-content: center; gap: 8px; margin-bottom: 16px;
        }

        .week-nav button {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            padding: 9px 15px; border-radius: 10px;
            cursor: pointer; font-size: 15px;
            color: var(--accent); box-shadow: var(--shadow);
            font-weight: 700; transition: all 0.15s;
        }
        .week-nav button:active { transform: scale(0.94); }

        .week-nav .week-label {
            font-weight: 700; font-size: 12px;
            color: var(--text-primary); text-align: center;
            min-width: 160px;
        }

        .week-nav .today-btn { font-size: 11px; padding: 7px 11px; color: var(--text-secondary); }

        .week-grid { display: flex; flex-direction: column; gap: 8px; }

        .day-card {
            background: var(--bg-card); border-radius: 14px;
            padding: 14px 16px; box-shadow: var(--shadow);
            border-left: 4px solid transparent; transition: all 0.2s;
        }

        .day-card.today { background: var(--bg-today); border-left-color: var(--accent); }

        .day-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px;
            flex-wrap: wrap; gap: 6px;
        }

        .day-name { font-weight: 700; font-size: 14px; }
        .day-card.today .day-name { color: var(--accent); }
        .day-date { font-size: 12px; color: var(--text-muted); }

        .today-badge {
            background: var(--accent); color: #fff;
            font-size: 10px; padding: 3px 10px;
            border-radius: 20px; font-weight: 700;
        }

        .lessons-list { display: flex; flex-direction: column; gap: 6px; }

        .lesson-card {
            border-radius: 10px; padding: 10px 12px;
            display: flex; align-items: center; gap: 10px;
            font-size: 13px; transition: transform 0.1s;
        }
        .lesson-card:active { transform: scale(0.98); }

        .lesson-card.rehearsal { background: var(--bg-rehearsal); }
        .lesson-card.common { background: var(--bg-common); }
        .lesson-card.concert { background: var(--bg-concert); }
        .lesson-card.cancelled { background: var(--danger-bg); opacity: 0.7; }

        .lesson-time { font-weight: 700; font-size: 12px; white-space: nowrap; min-width: 55px; }
        .lesson-card.rehearsal .lesson-time { color: var(--accent); }
        .lesson-card.common .lesson-time { color: var(--warning); }
        .lesson-card.concert .lesson-time { color: var(--concert); }
        .lesson-card.cancelled .lesson-time { color: var(--danger); text-decoration: line-through; }

        .lesson-info { flex: 1; min-width: 0; }
        .lesson-title { font-weight: 600; font-size: 13px; }

        .lesson-badge {
            font-size: 10px; padding: 3px 8px;
            border-radius: 20px; font-weight: 700;
            color: #fff; white-space: nowrap; flex-shrink: 0;
        }
        .lesson-badge.rehearsal { background: var(--accent); }
        .lesson-badge.common { background: var(--warning); color: #000; }
        .lesson-badge.concert { background: var(--concert); }
        .lesson-badge.cancelled { background: var(--danger); }

        .empty-day { text-align: center; color: var(--text-muted); font-size: 12px; padding: 4px 0; }

        .legend {
            display: flex; gap: 14px; justify-content: center;
            flex-wrap: wrap; margin-top: 16px;
            font-size: 11px; color: var(--text-secondary);
        }
        .legend span { display: flex; align-items: center; gap: 5px; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .legend-dot.rehearsal { background: var(--accent); }
        .legend-dot.common { background: var(--warning); }
        .legend-dot.concert { background: var(--concert); }
        .legend-dot.cancelled { background: var(--danger); }

        @media (max-width: 400px) {
            .container { padding: 10px 10px 24px; }
            .day-card { padding: 10px 12px; }
            .lesson-card { padding: 8px 10px; gap: 6px; font-size: 11px; }
            .lesson-time { font-size: 10px; min-width: 45px; }
            .lesson-title { font-size: 11px; }
        }
    </style>
</head>
<body>
    <script>
        (function() {
            document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
        })();
    </script>

    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h2>📅 Расписание</h2>
        <select class="group-select" id="groupSelect" onchange="changeGroup(this.value)">
            <option value="">Загрузка...</option>
        </select>
    </div>

    <div class="container">
        <div class="week-nav">
            <button onclick="prevWeek()">←</button>
            <span class="week-label" id="weekLabel">Текущая неделя</span>
            <button onclick="nextWeek()">→</button>
            <button class="today-btn" onclick="goToThisWeek()">Сегодня</button>
        </div>

        <div class="week-grid" id="scheduleContent">Загрузка...</div>

        <div class="legend">
            <span><span class="legend-dot rehearsal"></span> Репетиция</span>
            <span><span class="legend-dot common"></span> Общая</span>
            <span><span class="legend-dot concert"></span> Концерт</span>
            <span><span class="legend-dot cancelled"></span> Отменена</span>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'schedule_group';
        let groups = [];
        let selectedGroupId = null;
        let allLessons = [];
        let weekOffset = 0;

        const dayNames = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
        const fullDayNames = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];

        function goBack() { window.location.href = 'lobby.html'; }

        function getMondayOfWeek(offset) {
            const now = new Date();
            const day = now.getDay();
            const mondayOffset = day === 0 ? -6 : 1 - day;
            const monday = new Date(now);
            monday.setDate(now.getDate() + mondayOffset + (offset * 7));
            monday.setHours(0, 0, 0, 0);
            return monday;
        }

        function getWeekDates(offset) {
            const monday = getMondayOfWeek(offset);
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                dates.push(d);
            }
            return dates;
        }

        function formatDate(date) {
            return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
        }

        function formatWeekLabel(dates) {
            const first = dates[0];
            const last = dates[6];
            const opts = { day: 'numeric', month: 'long' };
            return `${first.toLocaleDateString('ru-RU', opts)} — ${last.toLocaleDateString('ru-RU', opts)}`;
        }

        function isToday(date) {
            const today = new Date();
            return date.getDate() === today.getDate() &&
                   date.getMonth() === today.getMonth() &&
                   date.getFullYear() === today.getFullYear();
        }

        function dateToStr(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function prevWeek() { weekOffset--; loadSchedule(); }
        function nextWeek() { weekOffset++; loadSchedule(); }
        function goToThisWeek() { weekOffset = 0; loadSchedule(); }

        async function init() {
            await loadGroups();
            const savedGroupId = localStorage.getItem(STORAGE_KEY);
            if (!savedGroupId || !groups.find(g => g.id == savedGroupId)) {
                if (groups.length > 0) {
                    selectedGroupId = groups[0].id;
                    localStorage.setItem(STORAGE_KEY, selectedGroupId);
                    document.getElementById('groupSelect').value = selectedGroupId;
                    loadSchedule();
                }
            } else {
                selectedGroupId = parseInt(savedGroupId);
                document.getElementById('groupSelect').value = selectedGroupId;
                loadSchedule();
            }
        }

        async function loadGroups() {
            try {
                const res = await fetch('/api/schedule/groups');
                const data = await res.json();
                if (data.success) {
                    groups = data.groups;
                    const select = document.getElementById('groupSelect');
                    select.innerHTML = groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
                }
            } catch(e) { console.error(e); }
        }

        function changeGroup(id) {
            selectedGroupId = parseInt(id);
            localStorage.setItem(STORAGE_KEY, id);
            loadSchedule();
        }

        async function loadSchedule() {
            if (!selectedGroupId) return;
            try {
                const res = await fetch(`/api/schedule?groupId=${selectedGroupId}`);
                const data = await res.json();
                if (data.success) {
                    allLessons = data.lessons;
                    renderSchedule();
                }
            } catch(e) { console.error(e); }
        }

        function getCardType(lesson) {
            if (lesson.status === 'cancelled') return 'cancelled';
            if (lesson.event_type === 'concert') return 'concert';
            if (lesson.is_common) return 'common';
            return 'rehearsal';
        }

        function getBadgeText(lesson) {
            if (lesson.status === 'cancelled') return 'Отменена';
            if (lesson.event_type === 'concert') return '🎤 Концерт';
            if (lesson.is_common) return 'Общая';
            return lesson.group_name || 'Репетиция';
        }

        function renderLessonCard(lesson) {
            const cardType = getCardType(lesson);
            const badgeText = getBadgeText(lesson);
            
            const timeStr = lesson.end_time 
                ? `${lesson.start_time.substring(0,5)}–${lesson.end_time.substring(0,5)}`
                : lesson.start_time.substring(0,5);
            
            const title = lesson.title || (lesson.event_type === 'concert' ? 'Концерт' : 'Репетиция');
            
            return `
                <div class="lesson-card ${cardType}">
                    <div class="lesson-time">${timeStr}</div>
                    <div class="lesson-info">
                        <div class="lesson-title">${title}</div>
                        ${lesson.description ? `<div style="font-size:11px;color:var(--text-secondary);">${lesson.description}</div>` : ''}
                    </div>
                    <span class="lesson-badge ${cardType}">${badgeText}</span>
                </div>
            `;
        }

        function renderSchedule() {
            const container = document.getElementById('scheduleContent');
            const weekDates = getWeekDates(weekOffset);
            
            document.getElementById('weekLabel').textContent = formatWeekLabel(weekDates);
            
            let html = '';
            weekDates.forEach((date) => {
                const dayOfWeek = date.getDay();
                const dateStr = dateToStr(date);
                
                // Недельные уроки (по дню недели)
                const weeklyLessons = allLessons.filter(l => 
                    l.lesson_date === null && l.day_of_week === dayOfWeek
                );
                
                // Разовые уроки (по конкретной дате)
                const onetimeLessons = allLessons.filter(l => 
                    l.lesson_date === dateStr
                );
                
                // Объединяем и сортируем по времени
                const dayLessons = [...weeklyLessons, ...onetimeLessons].sort((a, b) => 
                    a.start_time.localeCompare(b.start_time)
                );
                
                const todayClass = isToday(date) ? 'today' : '';
                
                html += `<div class="day-card ${todayClass}">`;
                html += '<div class="day-header">';
                html += `<span class="day-name">${fullDayNames[dayOfWeek]}</span>`;
                html += `<span class="day-date">${formatDate(date)}</span>`;
                if (isToday(date)) html += '<span class="today-badge">Сегодня</span>';
                html += '</div><div class="lessons-list">';
                
                if (dayLessons.length === 0) {
                    html += '<div class="empty-day">Нет событий</div>';
                } else {
                    dayLessons.forEach(lesson => { html += renderLessonCard(lesson); });
                }
                
                html += '</div></div>';
            });
            
            container.innerHTML = html;
        }

        init();
    </script>
</body>
</html>
