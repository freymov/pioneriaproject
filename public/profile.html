<!DOCTYPE html>
<html lang="ru">
<head>
            <!-- Блокируем рендеринг до применения темы -->
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Профиль — Pioneria</title>
    <link rel="icon" type="image/jpg" href="/favicon.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Светлая тема */
        :root,
        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #333333;
            --text-secondary: #999999;
            --accent: #667eea;
            --accent-hover: #764ba2;
            --border-color: #f0f0f0;
            --card-bg: #ffffff;
            --card-shadow: 0 2px 10px rgba(0,0,0,0.05);
            --header-bg: #ffffff;
            --danger-color: #ff4757;
            --modal-overlay: rgba(0,0,0,0.5);
            --avatar-border: #667eea;
        }

        /* Тёмная тема */
        [data-theme="dark"] {
            --bg-primary: #1e1e2e;
            --bg-secondary: #2a2a3e;
            --text-primary: #e4e6eb;
            --text-secondary: #b0b3b8;
            --accent: #7c8aff;
            --accent-hover: #9b8aff;
            --border-color: #3e4042;
            --card-bg: #2a2a3e;
            --card-shadow: 0 2px 10px rgba(0,0,0,0.3);
            --header-bg: #2a2a3e;
            --danger-color: #ff6b6b;
            --modal-overlay: rgba(0,0,0,0.7);
            --avatar-border: #7c8aff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-secondary);
            min-height: 100vh;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }

        .header {
            background: var(--header-bg);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--card-shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background 0.3s;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--accent);
            padding: 5px;
        }

        .header h1 {
            font-size: 20px;
            color: var(--text-primary);
        }

        .content {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Аватар секция */
        .avatar-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: var(--card-shadow);
            transition: background 0.3s;
        }

        .avatar-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        .avatar-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--avatar-border);
        }

        .avatar-placeholder {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 48px;
            border: 3px solid var(--avatar-border);
        }

        .avatar-edit-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            border: 3px solid var(--card-bg);
            font-size: 18px;
            transition: background 0.3s;
        }

        .avatar-name {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        /* Секция с информацией */
        .info-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 10px 0;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            transition: background 0.3s;
        }

        .info-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
        }

        .info-item:hover {
            background: var(--bg-secondary);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-icon {
            width: 40px;
            font-size: 22px;
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 16px;
            color: var(--text-primary);
        }

        .info-action {
            color: var(--accent);
            font-size: 14px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .info-action:hover {
            background: var(--bg-secondary);
        }

        /* Тема — кнопка-переключатель */
        .theme-switch {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-switch-track {
            width: 50px;
            height: 28px;
            background: var(--accent);
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .theme-switch-thumb {
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 3px;
            transition: left 0.3s;
        }

        [data-theme="dark"] .theme-switch-thumb {
            left: 25px;
        }

        /* Модалка редактирования */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            transition: background 0.3s;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-secondary {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .content {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h1>Профиль</h1>
    </div>

    <div class="content">
        <!-- Аватар -->
        <div class="avatar-section">
            <div class="avatar-wrapper">
                <div id="profileAvatar"></div>
                <div class="avatar-edit-btn" onclick="document.getElementById('avatarInput').click()">📷</div>
            </div>
            <div class="avatar-name" id="profileName"></div>
            <input type="file" id="avatarInput" accept="image/*" style="display: none;">
        </div>

        <!-- Информация -->
        <div class="info-section">
            <div class="info-item" onclick="openEditNameModal()">
                <div class="info-icon">👤</div>
                <div class="info-content">
                    <div class="info-label">Имя</div>
                    <div class="info-value" id="displayName"></div>
                </div>
                <div class="info-action">Изменить</div>
            </div>
            
            <div class="info-item" onclick="toggleEmail()">
                <div class="info-icon">📧</div>
                <div class="info-content">
                    <div class="info-label">Email</div>
                    <div class="info-value" id="emailDisplay">••••••••••••</div>
                </div>
                <div class="info-action" id="toggleEmailBtn">Показать</div>
            </div>
        </div>

        <!-- Настройки -->
        <div class="info-section">
            <div class="info-item" onclick="toggleTheme()">
                <div class="info-icon">🎨</div>
                <div class="info-content">
                    <div class="info-label">Тема оформления</div>
                    <div class="info-value" id="themeLabel">Светлая</div>
                </div>
                <div class="theme-switch">
                    <div class="theme-switch-track">
                        <div class="theme-switch-thumb"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Действия -->
        <div class="info-section">
            <div class="info-item" onclick="logout()">
                <div class="info-icon">🚪</div>
                <div class="info-content">
                    <div class="info-value" style="color: var(--danger-color);">Выйти</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка редактирования имени -->
    <div class="modal" id="editNameModal">
        <div class="modal-content">
            <h3>Изменить имя</h3>
            <input type="text" id="newNameInput" placeholder="Введите новое имя">
            <div class="modal-actions">
                <button class="btn-primary" onclick="saveName()">Сохранить</button>
                <button class="btn-secondary" onclick="closeEditNameModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!userData.name) {
            window.location.href = 'login.html';
        }

        let emailVisible = false;

        // ========== ТЕМА ==========
        function getCurrentTheme() {
            return localStorage.getItem('theme') || 'light';
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateThemeUI();
        }

        function toggleTheme() {
            const current = getCurrentTheme();
            const newTheme = current === 'light' ? 'dark' : 'light';
            applyTheme(newTheme);
            saveThemeToServer(newTheme);
        }

        function updateThemeUI() {
            const theme = getCurrentTheme();
            document.getElementById('themeLabel').textContent = theme === 'light' ? 'Светлая' : 'Тёмная';
            // Обновляем meta theme-color
            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) {
                metaTheme.content = theme === 'light' ? '#667eea' : '#1a1a2e';
            }
        }

        async function saveThemeToServer(theme) {
            try {
                await fetch('/api/user/settings/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userId: userData.id, 
                        key: 'theme', 
                        value: theme 
                    })
                });
            } catch(e) {
                console.error('Ошибка сохранения темы:', e);
            }
        }

        async function loadThemeFromServer() {
            try {
                const res = await fetch(`/api/user/settings?userId=${userData.id}&key=theme`);
                const data = await res.json();
                if (data.success && data.value) {
                    applyTheme(data.value);
                } else {
                    applyTheme(getCurrentTheme());
                }
            } catch(e) {
                applyTheme(getCurrentTheme());
            }
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        function init() {
            document.getElementById('profileName').textContent = userData.name;
            document.getElementById('displayName').textContent = userData.name;
            updateAvatar();
            loadThemeFromServer();
        }

        function updateAvatar() {
            const avatarUrl = userData.avatar;
            const initial = userData.name.charAt(0).toUpperCase();
            const container = document.getElementById('profileAvatar');
            
            if (avatarUrl) {
                container.innerHTML = `<img src="${avatarUrl}" class="avatar-image">`;
            } else {
                container.innerHTML = `<div class="avatar-placeholder">${initial}</div>`;
            }
        }

        function toggleEmail() {
            const emailSpan = document.getElementById('emailDisplay');
            const btn = document.getElementById('toggleEmailBtn');
            
            if (emailVisible) {
                emailSpan.textContent = '••••••••••••';
                btn.textContent = 'Показать';
            } else {
                emailSpan.textContent = userData.email;
                btn.textContent = 'Скрыть';
            }
            emailVisible = !emailVisible;
        }

        function openEditNameModal() {
            document.getElementById('newNameInput').value = userData.name;
            document.getElementById('editNameModal').classList.add('active');
        }

        function closeEditNameModal() {
            document.getElementById('editNameModal').classList.remove('active');
        }

        async function saveName() {
            const newName = document.getElementById('newNameInput').value.trim();
            
            if (!newName) {
                alert('Имя не может быть пустым');
                return;
            }
            
            if (newName === userData.name) {
                closeEditNameModal();
                return;
            }
            
            try {
                const res = await fetch('/api/update-name', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userData.id,
                        newName: newName,
                        oldName: userData.name
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    userData.name = newName;
                    localStorage.setItem('user', JSON.stringify(userData));
                    init();
                    closeEditNameModal();
                } else {
                    alert(data.error || 'Ошибка');
                }
            } catch(e) {
                alert('Ошибка сервера');
            }
        }

        // Загрузка аватарки
        document.getElementById('avatarInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const fd = new FormData();
            fd.append('image', file);
            
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: fd });
                const data = await res.json();
                
                if (data.success) {
                    userData.avatar = data.url;
                    
                    await fetch('/api/update-avatar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: userData.id,
                            avatarUrl: data.url
                        })
                    });
                    
                    localStorage.setItem('user', JSON.stringify(userData));
                    updateAvatar();
                } else {
                    alert('Ошибка загрузки');
                }
            } catch(e) {
                alert('Ошибка сервера');
            }
            
            document.getElementById('avatarInput').value = '';
        });

        function goBack() {
            window.location.href = 'lobby.html';
        }

        function logout() {
            if (confirm('Выйти из аккаунта?')) {
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            }
        }

        init();
    </script>
</body>
</html>
