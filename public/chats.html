<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Диалоги | Pioneria Project</title>
    <link rel="icon" type="image/jpg" href="/favicon.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header h1 {
            color: #667eea;
            font-size: 1.5rem;
        }
        .back-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        .chats-list {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .chat-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .chat-item:hover {
            background: #f5f5f5;
        }
        .chat-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            flex-shrink: 0;
        }
        .chat-info {
            flex: 1;
        }
        .chat-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chat-last-message {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        .chat-time {
            font-size: 11px;
            color: #999;
        }
        .unread-badge {
            background: #ff4444;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #999;
        }
        .new-chat-btn {
            background: #4caf50;
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .chat-last-message {
                max-width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💬 Диалоги</h1>
            <button class="back-btn" onclick="goToLobby()">← Назад</button>
        </div>

        <div class="chats-list" id="chatsList">
            <div class="empty-state">Загрузка...</div>
        </div>

        <button class="new-chat-btn" onclick="showNewChatModal()">➕ Новый диалог</button>
    </div>

    <!-- Модальное окно для выбора пользователя -->
    <div id="newChatModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: 20px; padding: 20px; width: 90%; max-width: 400px; margin: auto; margin-top: 20vh;">
            <h3 style="margin-bottom: 15px; color: #667eea;">Новый диалог</h3>
            <input type="text" id="searchUser" placeholder="Введите имя пользователя" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 2px solid #e0e0e0; border-radius: 10px;">
            <div id="usersListModal" style="max-height: 300px; overflow-y: auto;">
                <p>Загрузка...</p>
            </div>
            <button onclick="closeNewChatModal()" style="margin-top: 15px; width: 100%; background: #666; padding: 10px; border: none; border-radius: 10px; color: white; cursor: pointer;">Отмена</button>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('user') || '{}');
        if (!userData.name) {
            window.location.href = 'login.html';
        }

        let allUsers = [];

        function goToLobby() {
            window.location.href = 'lobby.html';
        }

        // Загрузка диалогов
        async function loadChats() {
            try {
                const response = await fetch(`/api/chats?userId=${userData.id}`);
                const result = await response.json();
                
                const chatsList = document.getElementById('chatsList');
                
                if (result.success && result.chats && result.chats.length > 0) {
                    chatsList.innerHTML = '';
                    result.chats.forEach(chat => {
                        const avatarLetter = chat.other_user_name ? chat.other_user_name.charAt(0).toUpperCase() : '?';
                        const lastMessage = chat.last_message || 'Нет сообщений';
                        const time = chat.last_message_time ? new Date(chat.last_message_time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                        
                        const div = document.createElement('div');
                        div.className = 'chat-item';
                        div.onclick = () => openChat(chat.id, chat.other_user_name);
                        div.innerHTML = `
                            <div class="chat-avatar">${avatarLetter}</div>
                            <div class="chat-info">
                                <div class="chat-name">
                                    ${escapeHtml(chat.other_user_name || 'Неизвестный')}
                                    ${chat.other_user_role === 'admin' ? '<span style="font-size: 10px; background: #667eea; color: white; padding: 2px 6px; border-radius: 10px;">ADMIN</span>' : ''}
                                </div>
                                <div class="chat-last-message">${escapeHtml(lastMessage.substring(0, 50))}</div>
                            </div>
                            <div class="chat-time">${time}</div>
                            ${chat.unread_count > 0 ? `<div class="unread-badge">${chat.unread_count}</div>` : ''}
                        `;
                        chatsList.appendChild(div);
                    });
                } else {
                    chatsList.innerHTML = '<div class="empty-state">У вас пока нет диалогов<br>Начните новый!</div>';
                }
            } catch (err) {
                console.error('Ошибка загрузки диалогов:', err);
                document.getElementById('chatsList').innerHTML = '<div class="empty-state">Ошибка загрузки</div>';
            }
        }

        function openChat(chatId, userName) {
            window.location.href = `chat.html?chatId=${chatId}&userName=${encodeURIComponent(userName)}`;
        }

        async function showNewChatModal() {
            const modal = document.getElementById('newChatModal');
            modal.style.display = 'flex';
            await loadUsersList();
        }

        async function loadUsersList() {
            try {
                const response = await fetch('/api/users');
                const result = await response.json();
                
                if (result.success && result.users) {
                    allUsers = result.users.filter(u => u.id !== userData.id);
                    renderUsersList(allUsers);
                }
            } catch (err) {
                document.getElementById('usersListModal').innerHTML = '<p>Ошибка загрузки</p>';
            }
        }

        function renderUsersList(users) {
            const container = document.getElementById('usersListModal');
            if (users.length === 0) {
                container.innerHTML = '<p>Пользователей не найдено</p>';
                return;
            }
            
            let html = '<div style="display: flex; flex-direction: column; gap: 8px;">';
            users.forEach(user => {
                html += `
                    <div onclick="startChat(${user.id})" style="padding: 10px; background: #f5f5f5; border-radius: 10px; cursor: pointer;">
                        <strong>${escapeHtml(user.name)}</strong>
                        <div style="font-size: 12px; color: #666;">${escapeHtml(user.email)}</div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        async function startChat(otherUserId) {
            try {
                const response = await fetch('/api/get-or-create-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userData.id, otherUserId })
                });
                
                const result = await response.json();
                if (result.success) {
                    const otherUser = allUsers.find(u => u.id === otherUserId);
                    window.location.href = `chat.html?chatId=${result.chatId}&userName=${encodeURIComponent(otherUser.name)}`;
                } else {
                    alert('Ошибка создания диалога');
                }
            } catch (err) {
                alert('Ошибка сервера');
            }
        }

        function closeNewChatModal() {
            const modal = document.getElementById('newChatModal');
            modal.style.display = 'none';
            document.getElementById('searchUser').value = '';
        }

        document.getElementById('searchUser')?.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allUsers.filter(u => u.name.toLowerCase().includes(query) || u.email.toLowerCase().includes(query));
            renderUsersList(filtered);
        });

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadChats();
    </script>
</body>
</html>
