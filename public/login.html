<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Чат - Вход и регистрация</title>
    <link rel="icon" type="image/jpg" href="/favicon.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 30px 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            color: #666;
            font-weight: 500;
            transition: all 0.3s;
            font-size: 16px;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            -webkit-appearance: none;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #764ba2;
        }

        button.secondary {
            background: #666;
        }

        button.secondary:hover {
            background: #555;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin-top: 5px;
            display: none;
            text-align: center;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px 15px;
            }
            h1 {
                font-size: 20px;
                margin-bottom: 20px;
            }
            .tab {
                padding: 10px;
                font-size: 14px;
            }
            input, button {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Pioneria Project Chat</h1>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Вход</div>
            <div class="tab" onclick="switchTab('register')">Регистрация</div>
        </div>

        <!-- Форма входа -->
        <div id="loginForm" class="form active">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Введите email">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="Введите пароль">
            </div>
            <button onclick="login()">Войти</button>
            <div id="loginError" class="error-message"></div>
        </div>

        <!-- Форма регистрации -->
        <div id="registerForm" class="form">
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="regName" placeholder="Введите ваше имя">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="Введите email">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="regPassword" placeholder="Придумайте пароль">
            </div>
            <div class="form-group">
                <label>Подтверждение пароля</label>
                <input type="password" id="regConfirmPassword" placeholder="Повторите пароль">
            </div>
            <div class="form-group">
                <label>🔑 Ключ доступа</label>
                <input type="text" id="regAccessKey" placeholder="Введите ключ">
            </div>
            <button onclick="register()">Зарегистрироваться</button>
            <div id="registerError" class="error-message"></div>
            <div id="registerSuccess" class="success-message"></div>
        </div>

        <!-- Форма верификации -->
        <div id="verificationForm" class="form">
            <div class="form-group">
                <label>Код подтверждения</label>
                <p style="font-size: 14px; color: #666; margin-bottom: 8px;">
                    Код отправлен на <strong id="verificationEmailDisplay"></strong>
                </p>
                <input type="text" id="verificationCode" placeholder="Введите код">
            </div>
            <button onclick="verifyEmail()">Подтвердить</button>
            <button onclick="resendCode()" class="secondary" style="margin-top: 10px;">Отправить код заново</button>
            <div id="verificationError" class="error-message"></div>
            <div id="verificationSuccess" class="success-message"></div>
        </div>
    </div>

    <script>
        let pendingEmail = null;

        // Восстанавливаем форму верификации, если она была прервана
        window.addEventListener('load', () => {
            const savedEmail = sessionStorage.getItem('pendingEmail');
            if (savedEmail) {
                pendingEmail = savedEmail;
                document.getElementById('registerForm').classList.remove('active');
                document.getElementById('verificationForm').classList.add('active');
                document.getElementById('verificationEmailDisplay').textContent = savedEmail;
                // Скрываем табы, чтобы не переключались
                document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
            }
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('registerForm').classList.remove('active');
            document.getElementById('verificationForm').classList.remove('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.getElementById('registerForm').classList.add('active');
            }
            
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
            document.getElementById('registerSuccess').style.display = 'none';
            document.getElementById('verificationError').style.display = 'none';
            document.getElementById('verificationSuccess').style.display = 'none';
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            if (!email || !password) {
                errorDiv.textContent = 'Заполните все поля';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('user', JSON.stringify(result.user));
                    window.location.href = 'lobby.html';
                } else {
                    errorDiv.textContent = result.error;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Ошибка сервера';
                errorDiv.style.display = 'block';
            }
        }

        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const accessKey = document.getElementById('regAccessKey').value;
            
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            
            if (!name || !email || !password || !confirmPassword || !accessKey) {
                errorDiv.textContent = 'Заполните все поля';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }
            
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Пароли не совпадают';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Пароль должен быть не менее 6 символов';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, accessKey })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    pendingEmail = email;
                    sessionStorage.setItem('pendingEmail', email);
                    
                    // Отправляем код подтверждения
                    const verifyResponse = await fetch('/api/send-verification', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    
                    const verifyResult = await verifyResponse.json();
                    
                    if (verifyResult.success) {
                        errorDiv.style.display = 'none';
                        successDiv.textContent = 'Код подтверждения отправлен на почту!';
                        successDiv.style.display = 'block';
                        
                        setTimeout(() => {
                            document.getElementById('registerForm').classList.remove('active');
                            document.getElementById('verificationForm').classList.add('active');
                            document.getElementById('verificationEmailDisplay').textContent = email;
                            successDiv.style.display = 'none';
                            // Скрываем табы
                            document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
                        }, 1500);
                    } else {
                        errorDiv.textContent = 'Ошибка отправки кода';
                        errorDiv.style.display = 'block';
                    }
                } else {
                    errorDiv.textContent = result.error;
                    errorDiv.style.display = 'block';
                    successDiv.style.display = 'none';
                }
            } catch (err) {
                errorDiv.textContent = 'Ошибка сервера';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            }
        }

        async function verifyEmail() {
            const code = document.getElementById('verificationCode').value;
            const errorDiv = document.getElementById('verificationError');
            const successDiv = document.getElementById('verificationSuccess');
            
            if (!code) {
                errorDiv.textContent = 'Введите код';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/verify-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail, code })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    successDiv.textContent = '✅ Email подтверждён! Теперь можно войти.';
                    successDiv.style.display = 'block';
                    sessionStorage.removeItem('pendingEmail');
                    setTimeout(() => {
                        // Возвращаем табы
                        document.querySelectorAll('.tab').forEach(t => t.style.display = 'flex');
                        switchTab('login');
                        document.getElementById('verificationCode').value = '';
                        document.getElementById('loginEmail').value = pendingEmail;
                        pendingEmail = null;
                    }, 2000);
                } else {
                    errorDiv.textContent = result.error;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Ошибка сервера';
                errorDiv.style.display = 'block';
            }
        }

        async function resendCode() {
            if (!pendingEmail) return;
            
            try {
                const response = await fetch('/api/send-verification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('Новый код отправлен на почту');
                } else {
                    alert('Ошибка отправки');
                }
            } catch (err) {
                alert('Ошибка сервера');
            }
        }
    </script>
</body>
</html>
