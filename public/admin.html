<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Админ-панель | Pioneria Project</title>
    <link rel="icon" type="image/jpg" href="/favicon.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Светлая тема */
        :root,
        [data-theme="light"] {
            --bg-body: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #333333;
            --text-secondary: #666666;
            --accent: #667eea;
            --accent-hover: #764ba2;
            --border-color: #eeeeee;
            --card-bg: #ffffff;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.1);
            --danger: #ff4444;
            --danger-hover: #cc0000;
            --success: #27ae60;
            --input-bg: #ffffff;
            --input-border: #e0e0e0;
        }

        /* Тёмная тема */
        [data-theme="dark"] {
            --bg-body: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --bg-primary: #1e1e2e;
            --bg-secondary: #2a2a3e;
            --text-primary: #e4e6eb;
            --text-secondary: #b0b3b8;
            --accent: #7c8aff;
            --accent-hover: #9b8aff;
            --border-color: #3e4042;
            --card-bg: #2a2a3e;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.3);
            --danger: #ff6b6b;
            --danger-hover: #ee5a5a;
            --success: #4caf50;
            --input-bg: #1e1e2e;
            --input-border: #3e4042;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            padding: 15px;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            transition: background 0.3s;
        }

        h1 {
            color: var(--accent);
            margin-bottom: 10px;
            font-size: 1.6rem;
        }

        h2 {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        h3 {
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .back-btn {
            background: #666;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            background: #555;
        }

        input, select, textarea {
            padding: 10px;
            border: 2px solid var(--input-border);
            border-radius: 10px;
            font-size: 14px;
            width: 100%;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }

        .keys-list {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            color: var(--text-primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        th {
            background: var(--bg-secondary);
            font-weight: 600;
        }

        .success {
            color: var(--success);
            margin-top: 10px;
        }

        .error {
            color: var(--danger);
            margin-top: 10px;
        }

        .news-item {
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 10px;
            transition: background 0.3s;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .card {
                padding: 15px;
            }
            h1 {
                font-size: 1.4rem;
            }
            h2 {
                font-size: 1.2rem;
            }
            .form-group {
                flex-direction: column;
                align-items: stretch;
            }
            input, select, button {
                width: 100%;
            }
            table {
                font-size: 11px;
            }
            th, td {
                padding: 6px 4px;
            }
        }

        @media (max-width: 480px) {
            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="goToLobby()">← Вернуться в лобби</button>

        <div class="card">
            <h1>🔧 Админ-панель</h1>
            <p>Добро пожаловать, <span id="adminName"></span>!</p>
        </div>

        <div class="card">
            <h2>🔑 Создать ключи доступа</h2>
            <div class="form-group">
                <input type="number" id="keyCount" placeholder="Количество" value="1" min="1" max="20">
                <select id="keyRole">
                    <option value="user">Обычный пользователь</option>
                    <option value="admin">Администратор</option>
                </select>
                <button onclick="generateKeys()">Создать ключи</button>
            </div>
            <div id="keysResult"></div>
            <div id="generatedKeys" class="keys-list" style="margin-top: 15px;"></div>
        </div>

        <div class="card">
            <h2>👥 Пользователи</h2>
            <button onclick="loadUsers()" style="margin-bottom: 15px;">Обновить список</button>
            <div id="usersList">
                <p>Загрузка...</p>
            </div>
        </div>

        <div class="card">
            <h2>📰 Управление новостями</h2>

            <div style="margin-bottom: 20px;">
                <h3>Создать новость</h3>
                <input type="text" id="newsTitle" placeholder="Заголовок" style="margin-bottom: 10px;">
                <textarea id="newsContent" placeholder="Текст новости" rows="3" style="margin-bottom: 10px;"></textarea>
                <button onclick="createNews()">➕ Создать</button>
            </div>

            <div>
                <h3>Существующие новости</h3>
                <div id="newsListAdmin" style="max-height: 300px; overflow-y: auto;">
                    <p>Загрузка...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('user') || '{}');

        if (!userData.name || userData.role !== 'admin') {
            alert('Доступ только для администраторов');
            window.location.href = 'lobby.html';
        }

        // ========== ТЕМА ==========
        function getCurrentTheme() {
            return localStorage.getItem('theme') || 'light';
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) {
                metaTheme.content = theme === 'light' ? '#667eea' : '#1a1a2e';
            }
        }

        async function loadTheme() {
            try {
                const res = await fetch(`/api/user/settings?userId=${userData.id}&key=theme`);
                const data = await res.json();
                if (data.success && data.value) {
                    applyTheme(data.value);
                    localStorage.setItem('theme', data.value);
                } else {
                    applyTheme(getCurrentTheme());
                }
            } catch(e) {
                applyTheme(getCurrentTheme());
            }
        }

        loadTheme();

        document.getElementById('adminName').textContent = userData.name;

        async function generateKeys() {
            const count = document.getElementById('keyCount').value;
            const role = document.getElementById('keyRole').value;

            try {
                const response = await fetch('/api/admin/generate-keys', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminEmail: userData.email, count, role })
                });

                const result = await response.json();

                if (result.success) {
                    const keysDiv = document.getElementById('generatedKeys');
                    keysDiv.innerHTML = '<strong>Созданные ключи:</strong><br>' + result.keys.join('<br>');
                    document.getElementById('keysResult').innerHTML = '<div class="success">✅ Ключи созданы!</div>';
                    setTimeout(() => {
                        document.getElementById('keysResult').innerHTML = '';
                    }, 3000);
                } else {
                    document.getElementById('keysResult').innerHTML = '<div class="error">❌ ' + result.error + '</div>';
                }
            } catch (err) {
                document.getElementById('keysResult').innerHTML = '<div class="error">❌ Ошибка сервера</div>';
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch(`/api/admin/users?adminEmail=${userData.email}`);
                const result = await response.json();

                if (result.success && result.users) {
                    let html = '<table><thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Роль</th><th>Дата</th><th>Действия</th></tr></thead><tbody>';
                    result.users.forEach(user => {
                        html += `<tr>
                            <td>${user.id}</td>
                            <td>${escapeHtml(user.name)}</td>
                            <td>${escapeHtml(user.email)}</td>
                            <td>${user.role === 'admin' ? '👑 Админ' : '👤 Пользователь'}</td>
                            <td>${new Date(user.created_at).toLocaleDateString()}</td>
                            <td><button onclick="deleteUser(${user.id}, '${escapeHtml(user.email)}')" style="background: var(--danger); padding: 4px 10px;">🗑️</button></td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('usersList').innerHTML = html;
                } else {
                    document.getElementById('usersList').innerHTML = '<p>Ошибка загрузки</p>';
                }
            } catch (err) {
                document.getElementById('usersList').innerHTML = '<p>Ошибка сервера</p>';
            }
        }

        function goToLobby() {
            window.location.href = 'lobby.html';
        }

        // ========== НОВОСТИ ==========
        async function loadNewsAdmin() {
            try {
                const response = await fetch('/api/news');
                const result = await response.json();

                const newsContainer = document.getElementById('newsListAdmin');

                if (result.success && result.news.length > 0) {
                    let html = '<div style="display: flex; flex-direction: column; gap: 10px;">';
                    result.news.forEach(news => {
                        const date = new Date(news.created_at).toLocaleDateString('ru-RU');
                        html += `
                            <div class="news-item">
                                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
                                    <div style="flex: 1;">
                                        <strong>${escapeHtml(news.title)}</strong>
                                        <div style="font-size: 12px; color: var(--text-secondary);">${escapeHtml(news.content)}</div>
                                        <div style="font-size: 10px; color: var(--text-secondary); margin-top: 5px;">${date}</div>
                                    </div>
                                    <button onclick="deleteNews(${news.id})" style="background: var(--danger); padding: 6px 12px;">🗑️</button>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    newsContainer.innerHTML = html;
                } else {
                    newsContainer.innerHTML = '<p>Новостей пока нет</p>';
                }
            } catch (err) {
                console.error('Ошибка:', err);
                document.getElementById('newsListAdmin').innerHTML = '<p>Ошибка загрузки</p>';
            }
        }

        async function createNews() {
            const title = document.getElementById('newsTitle').value.trim();
            const content = document.getElementById('newsContent').value.trim();

            if (!title || !content) {
                alert('Заполните заголовок и текст новости');
                return;
            }

            try {
                const response = await fetch('/api/admin/news', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminEmail: userData.email,
                        title,
                        content
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert('✅ Новость создана');
                    document.getElementById('newsTitle').value = '';
                    document.getElementById('newsContent').value = '';
                    loadNewsAdmin();
                } else {
                    alert('❌ ' + result.error);
                }
            } catch (err) {
                alert('Ошибка сервера');
            }
        }

        async function deleteNews(newsId) {
            if (!confirm('Удалить новость?')) return;

            try {
                const response = await fetch(`/api/admin/news/${newsId}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminEmail: userData.email })
                });

                const result = await response.json();

                if (result.success) {
                    alert('✅ Новость удалена');
                    loadNewsAdmin();
                } else {
                    alert('❌ ' + result.error);
                }
            } catch (err) {
                alert('Ошибка сервера');
            }
        }

        async function deleteUser(userId, userEmail) {
            if (!confirm(`Удалить пользователя ${userEmail}? Это действие необратимо.`)) return;

            try {
                const response = await fetch('/api/admin/delete-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminEmail: userData.email,
                        userId: userId
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert('✅ Пользователь удалён');
                    loadUsers();
                } else {
                    alert('❌ ' + result.error);
                }
            } catch (err) {
                alert('Ошибка сервера');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadUsers();
        loadNewsAdmin();
    </script>
</body>
</html>
