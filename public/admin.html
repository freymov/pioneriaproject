<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Админ-панель | Pioneria Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.6rem;
        }
        h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        .back-btn {
            background: #666;
            margin-bottom: 20px;
        }
        input, select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            flex: 1;
        }
        .keys-list {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f5f5f5;
        }
        .success {
            color: green;
            margin-top: 10px;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }
        
        /* Мобильная версия */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .card {
                padding: 15px;
            }
            h1 {
                font-size: 1.4rem;
            }
            h2 {
                font-size: 1.2rem;
            }
            .form-group {
                flex-direction: column;
                align-items: stretch;
            }
            input, select, button {
                width: 100%;
                margin-right: 0;
            }
            table {
                font-size: 11px;
            }
            th, td {
                padding: 6px 4px;
            }
            .keys-list {
                font-size: 10px;
            }
        }
        
        @media (max-width: 480px) {
            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="goToLobby()">← Вернуться в лобби</button>
        
        <div class="card">
            <h1>🔧 Админ-панель</h1>
            <p>Добро пожаловать, <span id="adminName"></span>!</p>
        </div>

        <div class="card">
            <h2>🔑 Создать ключи доступа</h2>
            <div class="form-group">
                <input type="number" id="keyCount" placeholder="Количество" value="1" min="1" max="20">
                <select id="keyRole">
                    <option value="user">Обычный пользователь</option>
                    <option value="admin">Администратор</option>
                </select>
                <button onclick="generateKeys()">Создать ключи</button>
            </div>
            <div id="keysResult"></div>
            <div id="generatedKeys" class="keys-list" style="margin-top: 15px;"></div>
        </div>

        <div class="card">
            <h2>👥 Пользователи</h2>
            <button onclick="loadUsers()" style="margin-bottom: 15px;">Обновить список</button>
            <div id="usersList">
                <p>Загрузка...</p>
            </div>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!userData.name || userData.role !== 'admin') {
            alert('Доступ только для администраторов');
            window.location.href = 'lobby.html';
        }
        
        document.getElementById('adminName').textContent = userData.name;
        
        async function generateKeys() {
            const count = document.getElementById('keyCount').value;
            const role = document.getElementById('keyRole').value;
            
            try {
                const response = await fetch('/api/admin/generate-keys', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminEmail: userData.email, count, role })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    const keysDiv = document.getElementById('generatedKeys');
                    keysDiv.innerHTML = '<strong>Созданные ключи:</strong><br>' + result.keys.join('<br>');
                    document.getElementById('keysResult').innerHTML = '<div class="success">✅ Ключи созданы!</div>';
                    setTimeout(() => {
                        document.getElementById('keysResult').innerHTML = '';
                    }, 3000);
                } else {
                    document.getElementById('keysResult').innerHTML = '<div class="error">❌ ' + result.error + '</div>';
                }
            } catch (err) {
                document.getElementById('keysResult').innerHTML = '<div class="error">❌ Ошибка сервера</div>';
            }
        }
        
        async function loadUsers() {
            try {
                const response = await fetch(`/api/admin/users?adminEmail=${userData.email}`);
                const result = await response.json();
                
                if (result.success && result.users) {
                    let html = '`<table><thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Роль</th><th>Дата</th></tr></thead><tbody>`';
                    result.users.forEach(user => {
                        html += `<tr>
                            <td>${user.id}</td>
                            <td>${user.name}</td>
                            <td>${user.email}</td>
                            <td>${user.role === 'admin' ? '👑 Админ' : '👤 Пользователь'}</td>
                            <td>${new Date(user.created_at).toLocaleDateString()}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('usersList').innerHTML = html;
                } else {
                    document.getElementById('usersList').innerHTML = '<p>Ошибка загрузки</p>';
                }
            } catch (err) {
                document.getElementById('usersList').innerHTML = '<p>Ошибка сервера</p>';
            }
        }
        
        function goToLobby() {
            window.location.href = 'lobby.html';
        }
        
        loadUsers();
    </script>
</body>
</html>
