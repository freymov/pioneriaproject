<!DOCTYPE html>
<html lang="ru">
<head>
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Админ-панель | Pioneria Project</title>
    <link rel="icon" type="image/jpg" href="/favicon.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root, [data-theme="light"] {
            --bg: #f0f2f5; --bg-card: #ffffff; --bg-secondary: #f8f9fa;
            --text: #1a1a1a; --text-secondary: #666;
            --accent: #667eea; --accent-hover: #5a6fd6;
            --border: #e8e8e8; --danger: #ff4757; --danger-bg: #fff0f0;
            --success: #27ae60; --success-bg: #e8f8e8;
            --warning: #f59e0b; --warning-bg: #fff8e8;
            --concert: #22c55e; --concert-bg: #e8fce8;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        [data-theme="dark"] {
            --bg: #1a1a2e; --bg-card: #252540; --bg-secondary: #2e2e4a;
            --text: #e4e6eb; --text-secondary: #a0a3b0;
            --accent: #7c8aff; --accent-hover: #6a78f0;
            --border: #3a3a55; --danger: #ff6b6b; --danger-bg: #3a2020;
            --success: #4caf50; --success-bg: #1a3a20;
            --warning: #f0a030; --warning-bg: #3a3020;
            --concert: #4ade80; --concert-bg: #1a3020;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); min-height: 100vh;
            padding: 12px; color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .card {
            background: var(--bg-card); border-radius: 16px;
            padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow);
        }

        h1 { font-size: 1.3rem; color: var(--accent); margin-bottom: 4px; }
        h2 { font-size: 1.1rem; color: var(--accent); margin-bottom: 12px; }
        h3 { font-size: 0.9rem; color: var(--text); margin-bottom: 8px; }

        button {
            background: var(--accent); color: #fff;
            border: none; padding: 10px 16px; border-radius: 10px;
            cursor: pointer; font-size: 13px; font-weight: 600;
        }
        button:hover { background: var(--accent-hover); }
        .back-btn { background: #777; margin-bottom: 12px; }
        .back-btn:hover { background: #666; }
        .btn-sm { padding: 6px 12px; font-size: 11px; border-radius: 8px; }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: var(--warning); color: #000; }
        .btn-success { background: var(--success); }

        input, select, textarea {
            padding: 10px 12px; border: 2px solid var(--border);
            border-radius: 10px; font-size: 13px; width: 100%;
            background: var(--bg-card); color: var(--text); font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }

        .row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
        .row > * { flex: 1; min-width: 100px; }

        /* Чекбоксы дней */
        .day-checkboxes {
            display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
        }
        .day-checkbox {
            display: flex; align-items: center; gap: 4px;
            padding: 8px 12px; border: 2px solid var(--border);
            border-radius: 10px; cursor: pointer; font-size: 13px;
            font-weight: 600; transition: all 0.15s;
            background: var(--bg-card); color: var(--text);
            user-select: none;
        }
        .day-checkbox:hover { border-color: var(--accent); }
        .day-checkbox.checked {
            background: var(--accent); color: #fff; border-color: var(--accent);
        }
        .day-checkbox input { display: none; }

        .mode-tabs {
            display: flex; gap: 0; margin-bottom: 12px;
            border-radius: 10px; overflow: hidden; border: 2px solid var(--border);
        }
        .mode-tab {
            flex: 1; padding: 10px; text-align: center;
            cursor: pointer; font-size: 13px; font-weight: 600;
            background: var(--bg-card); color: var(--text-secondary);
            border: none; transition: all 0.15s;
        }
        .mode-tab.active {
            background: var(--accent); color: #fff;
        }
        .mode-tab:not(.active):hover { background: var(--bg-secondary); }

        .keys-box {
            background: var(--bg-secondary); padding: 12px;
            border-radius: 10px; font-family: monospace;
            font-size: 11px; word-break: break-all;
            max-height: 200px; overflow-y: auto;
            margin-top: 10px; line-height: 1.6;
        }

        .user-card, .lesson-row, .news-row {
            background: var(--bg-secondary); border-radius: 10px;
            padding: 10px 12px; margin-bottom: 6px;
            display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 6px; font-size: 12px;
        }
        .user-card .user-info { flex: 1; min-width: 150px; }
        .user-card .user-name { font-weight: 600; }
        .user-card .user-email { color: var(--text-secondary); font-size: 11px; }
        .user-card .user-meta { font-size: 10px; color: var(--text-secondary); }

        .lesson-status, .lesson-type, .badge {
            font-weight: 700; font-size: 10px;
            padding: 2px 8px; border-radius: 20px; white-space: nowrap;
        }
        .lesson-status.active { background: var(--success-bg); color: var(--success); }
        .lesson-status.cancelled { background: var(--danger-bg); color: var(--danger); }
        .lesson-type.rehearsal { background: #eef0ff; color: var(--accent); }
        .lesson-type.concert { background: var(--concert-bg); color: #15803d; }
        .badge.admin { background: #f0e6ff; color: #7c3aed; }
        .badge.user { background: #e0e7ff; color: #4f46e5; }
        .badge.common { background: var(--warning-bg); color: #b45309; }
        .badge.date { background: var(--success-bg); color: #15803d; }

        .msg { padding: 6px 0; font-size: 12px; }
        .msg.success { color: var(--success); }
        .msg.error { color: var(--danger); }

        label.checkbox-label {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; font-size: 13px;
        }
        label.checkbox-label input { width: auto; }

        @media (max-width: 480px) {
            body { padding: 8px; }
            .card { padding: 14px; margin-bottom: 10px; border-radius: 14px; }
            h1 { font-size: 1.1rem; } h2 { font-size: 1rem; }
            button { padding: 10px 14px; font-size: 12px; }
            .row > * { min-width: 100%; }
            .day-checkboxes { gap: 4px; }
            .day-checkbox { padding: 6px 10px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="goToLobby()">← Лобби</button>

        <div class="card">
            <h1>🔧 Админ-панель</h1>
            <p style="font-size:13px; color: var(--text-secondary);">Добро пожаловать, <span id="adminName"></span></p>
        </div>

        <!-- Ключи -->
        <div class="card">
            <h2>🔑 Ключи доступа</h2>
            <div class="row">
                <input type="number" id="keyCount" value="1" min="1" max="20" style="flex:0.5; min-width:80px;">
                <select id="keyRole" style="flex:1;">
                    <option value="user">Пользователь</option>
                    <option value="admin">Админ</option>
                </select>
                <button onclick="generateKeys()" style="flex:0.8;">Создать</button>
            </div>
            <div id="keysResult" class="msg"></div>
            <div id="generatedKeys" class="keys-box"></div>
        </div>

        <!-- Пользователи -->
        <div class="card">
            <h2>👥 Пользователи</h2>
            <button onclick="loadUsers()" class="btn-sm" style="margin-bottom:10px;">🔄 Обновить</button>
            <div id="usersList">Загрузка...</div>
        </div>

        <!-- Расписание -->
        <div class="card">
            <h2>📅 Расписание</h2>
            <h3>Добавить событие</h3>
            
            <!-- Режим: дни недели или конкретная дата -->
            <div class="mode-tabs">
                <button class="mode-tab active" onclick="switchMode('week')" id="modeWeek">📅 Дни недели</button>
                <button class="mode-tab" onclick="switchMode('date')" id="modeDate">📆 Конкретная дата</button>
            </div>
            
            <div class="row">
                <select id="scheduleEventType" onchange="onEventTypeChange()">
                    <option value="rehearsal">🎵 Репетиция</option>
                    <option value="concert">🎤 Концерт</option>
                </select>
            </div>
            
            <!-- Дни недели (режим "week") -->
            <div id="weekMode">
                <div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;">Выберите дни:</div>
                <div class="day-checkboxes" id="dayCheckboxes">
                    <label class="day-checkbox" data-day="1"><input type="checkbox">Пн</label>
                    <label class="day-checkbox" data-day="2"><input type="checkbox">Вт</label>
                    <label class="day-checkbox" data-day="3"><input type="checkbox">Ср</label>
                    <label class="day-checkbox" data-day="4"><input type="checkbox">Чт</label>
                    <label class="day-checkbox" data-day="5"><input type="checkbox">Пт</label>
                    <label class="day-checkbox" data-day="6"><input type="checkbox">Сб</label>
                    <label class="day-checkbox" data-day="0"><input type="checkbox">Вс</label>
                </div>
            </div>
            
            <!-- Конкретная дата (режим "date") -->
            <div id="dateMode" style="display:none;">
                <input type="date" id="scheduleDate" style="margin-bottom:8px;">
            </div>
            
            <div class="row" id="groupRow">
                <select id="scheduleGroup"><option value="">Группа</option></select>
            </div>
            <div class="row">
                <input type="time" id="scheduleStart" style="flex:1;" placeholder="Начало">
                <input type="time" id="scheduleEnd" style="flex:1;" placeholder="Конец">
            </div>
            <div id="commonRow">
                <label class="checkbox-label" style="margin-bottom: 8px;">
                    <input type="checkbox" id="scheduleIsCommon"> Общая (для всех групп)
                </label>
            </div>
            <button onclick="saveScheduleLesson()" style="width:100%;">💾 Сохранить</button>

            <h3 style="margin-top: 14px;">Все события</h3>
            <button onclick="loadAllSchedule()" class="btn-sm" style="margin-bottom:8px;">🔄 Обновить</button>
            <div id="scheduleListAdmin">Загрузка...</div>
        </div>

        <!-- Новости -->
        <div class="card">
            <h2>📰 Новости</h2>
            <h3>Создать</h3>
            <input type="text" id="newsTitle" placeholder="Заголовок" style="margin-bottom:6px;">
            <textarea id="newsContent" rows="2" placeholder="Текст" style="margin-bottom:6px;"></textarea>
            <button onclick="createNews()" style="width:100%;">➕ Опубликовать</button>

            <h3 style="margin-top:14px;">Опубликованные</h3>
            <div id="newsListAdmin">Загрузка...</div>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('user') || '{}');
        if (!userData.name || userData.role !== 'admin') window.location.href = 'lobby.html';

        (function(){
            document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
        })();

        document.getElementById('adminName').textContent = userData.name;
        function goToLobby(){window.location.href='lobby.html';}
        function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

        let scheduleMode = 'week'; // 'week' или 'date'

        // Переключение режима
        function switchMode(mode) {
            scheduleMode = mode;
            document.getElementById('modeWeek').classList.toggle('active', mode === 'week');
            document.getElementById('modeDate').classList.toggle('active', mode === 'date');
            document.getElementById('weekMode').style.display = mode === 'week' ? 'block' : 'none';
            document.getElementById('dateMode').style.display = mode === 'date' ? 'block' : 'none';
            
            // Для конкретной даты скрываем "общая для всех"
            document.getElementById('commonRow').style.display = mode === 'date' ? 'none' : 'flex';
        }

        // Клик по чекбоксам дней
        document.getElementById('dayCheckboxes').addEventListener('click', function(e) {
            const label = e.target.closest('.day-checkbox');
            if (!label) return;
            e.preventDefault();
            const cb = label.querySelector('input');
            cb.checked = !cb.checked;
            label.classList.toggle('checked', cb.checked);
        });

        function getSelectedDays() {
            const checked = document.querySelectorAll('#dayCheckboxes .day-checkbox.checked');
            return Array.from(checked).map(cb => parseInt(cb.dataset.day));
        }

        function onEventTypeChange() {
            const type = document.getElementById('scheduleEventType').value;
            const isConcert = type === 'concert';
            document.getElementById('groupRow').style.display = isConcert ? 'none' : 'flex';
            document.getElementById('scheduleEnd').style.display = isConcert ? 'none' : '';
            if (isConcert) {
                document.getElementById('scheduleEnd').value = '';
                document.getElementById('scheduleIsCommon').checked = false;
            }
        }

        // Ключи
        async function generateKeys(){
            const c=document.getElementById('keyCount').value, r=document.getElementById('keyRole').value;
            try{
                const res=await fetch('/api/admin/generate-keys',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminEmail:userData.email,count:c,role:r})});
                const d=await res.json();
                d.success?(
                    document.getElementById('generatedKeys').innerHTML='<strong>Ключи:</strong><br>'+d.keys.join('<br>'),
                    document.getElementById('keysResult').innerHTML='<div class="msg success">✅ Создано</div>',
                    setTimeout(()=>document.getElementById('keysResult').innerHTML='',3000)
                ):document.getElementById('keysResult').innerHTML='<div class="msg error">❌ '+d.error+'</div>';
            }catch(e){}
        }

        // Пользователи
        async function loadUsers(){
            try{
                const res=await fetch('/api/admin/users?adminEmail='+userData.email);
                const d=await res.json();
                if(d.success&&d.users){
                    document.getElementById('usersList').innerHTML=d.users.map(u=>
                        `<div class="user-card">
                            <div class="user-info">
                                <span class="user-name">${esc(u.name)}</span>
                                <span class="badge ${u.role}">${u.role==='admin'?'👑 Админ':'👤 Юзер'}</span>
                                ${u.username ? `<span style="color:var(--accent);font-size:11px;">@${esc(u.username)}</span>` : ''}
                                <br><span class="user-email">${esc(u.email)}</span>
                                <br><span class="user-meta">ID ${u.id} · ${new Date(u.created_at).toLocaleDateString('ru-RU')}</span>
                            </div>
                            <button class="btn-sm btn-danger" onclick="deleteUser(${u.id},'${esc(u.email)}')">🗑</button>
                        </div>`
                    ).join('');
                }
            }catch(e){}
        }

        async function deleteUser(id,email){
            if(!confirm('Удалить '+email+'?'))return;
            await fetch('/api/admin/delete-user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminEmail:userData.email,userId:id})});
            loadUsers();
        }

        // Расписание
        async function loadScheduleGroups(){
            try{
                const res=await fetch('/api/schedule/groups');
                const d=await res.json();
                if(d.success) document.getElementById('scheduleGroup').innerHTML=d.groups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('');
            }catch(e){}
        }

        async function saveScheduleLesson(){
            const eventType = document.getElementById('scheduleEventType').value;
            const st = document.getElementById('scheduleStart').value;
            const et = document.getElementById('scheduleEnd').value;
            
            if(!st){alert('Укажите время');return;}
            
            const isConcert = eventType === 'concert';
            const gid = isConcert ? 1 : (document.getElementById('scheduleGroup').value || null);
            const common = isConcert ? true : document.getElementById('scheduleIsCommon').checked;
            
            const body = {
                adminEmail: userData.email,
                groupId: parseInt(gid) || null,
                startTime: st,
                endTime: et || null,
                title: eventType === 'concert' ? 'Концерт' : 'Репетиция',
                description: '',
                isCommon: common,
                eventType: eventType
            };
            
            if (scheduleMode === 'date') {
                const dateVal = document.getElementById('scheduleDate').value;
                if (!dateVal) { alert('Выберите дату'); return; }
                body.lessonDate = dateVal;
            } else {
                const days = getSelectedDays();
                if (days.length === 0) { alert('Выберите хотя бы один день недели'); return; }
                body.days = days;
            }
            
            try{
                const res = await fetch('/api/admin/schedule', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(body)
                });
                const d = await res.json();
                if(d.success){
                    alert('✅ Добавлено (' + (d.ids ? d.ids.length : 1) + ' зап.)');
                    loadAllSchedule();
                    document.getElementById('scheduleStart').value='';
                    document.getElementById('scheduleEnd').value='';
                    document.getElementById('scheduleIsCommon').checked=false;
                    document.getElementById('scheduleDate').value='';
                    // Снимаем выбор дней
                    document.querySelectorAll('#dayCheckboxes .day-checkbox.checked').forEach(cb => {
                        cb.classList.remove('checked');
                        cb.querySelector('input').checked = false;
                    });
                } else alert('❌ '+(d.error||'Ошибка'));
            }catch(e){alert('Ошибка сервера');}
        }

        async function loadAllSchedule(){
            try{
                const res = await fetch('/api/schedule');
                const d = await res.json();
                const dn = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
                if(d.success && d.lessons.length){
                    document.getElementById('scheduleListAdmin').innerHTML = d.lessons.map(l => {
                        const t = l.end_time ? `${l.start_time.substring(0,5)}–${l.end_time.substring(0,5)}` : l.start_time.substring(0,5);
                        const st = l.status === 'active' ? 'active' : 'cancelled';
                        const et = l.event_type || 'rehearsal';
                        
                        let dayStr = '';
                        if (l.lesson_date) {
                            dayStr = new Date(l.lesson_date).toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
                        } else if (l.day_of_week !== null && l.day_of_week !== undefined) {
                            dayStr = dn[l.day_of_week];
                        }
                        
                        const dateBadge = l.lesson_date ? ' <span class="badge date">📆 Дата</span>' : '';
                        
                        return `<div class="lesson-row">
                            <div style="flex:1;min-width:140px;">
                                <strong>${l.group_name||'Концерт'}</strong>${l.is_common?' <span class="badge common">Общая</span>':''}
                                <span class="lesson-type ${et}">${et==='concert'?'🎤 Концерт':'🎵 Репетиция'}</span>${dateBadge}
                                <span style="color:var(--text-secondary);"> — ${dayStr}, ${t}</span>
                                <span class="lesson-status ${st}">${l.status==='active'?'Активно':'Отменено'}</span>
                            </div>
                            <div style="display:flex;gap:4px;">
                                ${l.status==='active'?`<button class="btn-sm btn-warning" onclick="cancelLesson(${l.id})">Отм.</button>`:`<button class="btn-sm btn-success" onclick="restoreLesson(${l.id})">Восст.</button>`}
                                <button class="btn-sm btn-danger" onclick="deleteScheduleLesson(${l.id})">🗑</button>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    document.getElementById('scheduleListAdmin').innerHTML='<p style="font-size:12px;color:var(--text-secondary);">Нет событий</p>';
                }
            } catch(e) {
                console.error(e);
            }
        }

        async function cancelLesson(id){await fetch(`/api/admin/schedule/${id}/status`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminEmail:userData.email,status:'cancelled'})});loadAllSchedule();}
        async function restoreLesson(id){await fetch(`/api/admin/schedule/${id}/status`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminEmail:userData.email,status:'active'})});loadAllSchedule();}
        async function deleteScheduleLesson(id){if(!confirm('Удалить?'))return;await fetch(`/api/admin/schedule/${id}`,{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminEmail:userData.email})});loadAllSchedule();}

        // Новости
        async function loadNewsAdmin(){
            try{
                const res=await fetch('/api/news');
                const d=await res.json();
                if(d.success&&d.news.length){
                    document.getElementById('newsListAdmin').innerHTML=d.news.map(n=>
                        `<div class="news-row">
                            <div style="flex:1;">
                                <strong>${esc(n.title)}</strong>
                                <div style="color:var(--text-secondary);font-size:11px;">${esc(n.content)}</div>
                                <div style="color:var(--text-secondary);font-size:10px;margin-top:2px;">${new Date(n.created_at).toLocaleDateString('ru-RU')}</div>
                            </div>
                            <button class="btn-sm btn-danger" onclick="deleteNews(${n.id})">🗑</button>
                        </div>`
                    ).join('');
                }else document.getElementById('newsListAdmin').innerHTML='<p style="font-size:12px;color:var(--text-secondary);">Новостей нет</p>';
            }catch(e){}
        }

        async function createNews(){
            const t=document.getElementById('newsTitle').value.trim(), c=document.getElementById('newsContent').value.trim();
            if(!t||!c){alert('Заполните');return;}
            await fetch('/api/admin/news',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminEmail:userData.email,title:t,content:c})});
            document.getElementById('newsTitle').value=''; document.getElementById('newsContent').value='';
            loadNewsAdmin();
        }

        async function deleteNews(id){if(!confirm('Удалить?'))return;await fetch(`/api/admin/news/${id}`,{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminEmail:userData.email})});loadNewsAdmin();}

        // Старт
        loadUsers();
        loadNewsAdmin();
        loadScheduleGroups();
        loadAllSchedule();
    </script>
</body>
</html>
