name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install PWABuilder
        run: npm install -g @pwabuilder/cli
      
      - name: Build PWA
        run: |
          mkdir -p temp
          cp -r public/* temp/
          cd temp
          pwa build
      
      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pioneria-apk
          path: |
            **/*.apk
            temp/**/*.apk
